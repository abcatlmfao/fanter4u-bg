<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fanter | fantarena</title>
  <link rel="stylesheet" href="config/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; min-height: 100vh; color: white; transition: background 0.3s; }
    body.theme-dark { background: linear-gradient(135deg, #0a0a1a, #0f0f2a, #1a0a2a); }
    body.theme-light { background: linear-gradient(135deg, #f0f0f5, #e0e0ea, #d0d0e0); color: #1a1a2e; }
    body.theme-amoled { background: #000000; }
    body.theme-cyberpunk { background: linear-gradient(135deg, #0a0a2a, #1a0a3a, #2a0a4a); }
    .fantarena-container { display: flex; height: 100vh; width: 100%; }
    
    /* Sidebar */
    .sidebar { width: 260px; background: rgba(10,15,30,0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(45,90,227,0.3); display: flex; flex-direction: column; padding: 15px 0; overflow-y: auto; }
    body.theme-light .sidebar { background: rgba(255,255,255,0.9); border-right: 1px solid rgba(0,0,0,0.1); }
    .sidebar-header { padding: 0 15px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 8px; }
    .sidebar-header h2 { color: #ffcc00; font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 6px; }
    .theme-selector { margin-left: auto; background: rgba(255,255,255,0.1); border: none; border-radius: 15px; padding: 4px 8px; color: white; font-size: 12px; cursor: pointer; }
    .server-list { padding: 10px; }
    .server-item { padding: 8px 12px; margin: 2px 0; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.7); font-weight: 500; font-size: 14px; }
    .server-item:hover, .server-item.active { background: rgba(45,90,227,0.3); color: white; }
    .server-item.active { border-left: 3px solid #ffcc00; }
    .pinned-messages { padding: 8px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); max-height: 100px; overflow-y: auto; font-size: 11px; }
    .pinned-item { background: rgba(255,204,0,0.1); padding: 5px 10px; border-radius: 6px; margin-bottom: 4px; font-size: 11px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .friends-header { padding: 15px 15px 8px; color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; text-transform: uppercase; display: flex; justify-content: space-between; position: relative; }
    .add-friend-btn { background: none; border: none; color: #ffcc00; cursor: pointer; font-size: 16px; }
    .request-badge { position: absolute; top: 13px; right: 12px; background: #ff4444; color: white; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 8px; cursor: pointer; }
    .friend-item, .group-item { padding: 6px 15px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 6px; margin: 1px 8px; font-size: 13px; }
    .friend-item:hover, .group-item:hover { background: rgba(45,90,227,0.2); }
    .friend-avatar { width: 30px; height: 30px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
    .friend-info { flex: 1; }
    .friend-name { font-weight: 600; font-size: 13px; }
    .friend-status { font-size: 10px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 4px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-dot.online { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
    .status-dot.offline { background: #666; }
    
    /* Main Chat */
    .chat-main { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); min-width: 0; }
    .chat-header { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .chat-header h3 { font-weight: 700; color: #ffcc00; font-size: 16px; }
    .search-bar { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .search-bar input { padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(45,90,227,0.4); background: rgba(0,0,0,0.3); color: white; font-size: 13px; width: 180px; }
    .search-bar input::placeholder { color: rgba(255,255,255,0.4); }
    .messages-container { flex: 1; overflow-y: auto; padding: 15px 20px; display: flex; flex-direction: column; gap: 14px; }
    .message { display: flex; align-items: flex-start; gap: 12px; position: relative; }
    .message:hover { background: rgba(255,255,255,0.02); }
    .message:hover .message-actions { opacity: 1; }
    .message-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; cursor: pointer; flex-shrink: 0; }
    .message-content { flex: 1; min-width: 0; }
    .message-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; flex-wrap: wrap; }
    .message-name { font-weight: 700; cursor: pointer; font-size: 14px; }
    .message-time { font-size: 10px; color: rgba(255,255,255,0.4); }
    .message-edited { font-size: 9px; color: rgba(255,255,255,0.3); margin-left: 4px; }
    .mention { background: rgba(255,204,0,0.3); padding: 0 3px; border-radius: 4px; font-weight: 600; cursor: pointer; }
    .message-text { color: rgba(255,255,255,0.95); word-break: break-word; line-height: 1.4; font-size: 14px; }
    .message-actions { display: flex; gap: 4px; position: absolute; right: 0; top: -8px; background: rgba(20,30,50,0.98); border: 1px solid rgba(45,90,227,0.3); border-radius: 15px; padding: 3px 6px; opacity: 0; transition: opacity 0.15s; }
    .message-action-btn { background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 11px; padding: 2px 5px; border-radius: 4px; }
    .message-action-btn:hover { background: rgba(45,90,227,0.3); color: white; }
    .thread-indicator { margin-top: 6px; font-size: 11px; color: #ffcc00; cursor: pointer; }
    .typing-indicator { padding: 6px 20px; color: rgba(255,255,255,0.4); font-size: 11px; font-style: italic; }
    
    /* Input Area */
    .message-input-container { padding: 15px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
    .reply-bar { background: rgba(45,90,227,0.2); padding: 6px 12px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .reply-bar button { background: none; border: none; color: #ff6666; cursor: pointer; font-size: 14px; }
    .input-row { display: flex; gap: 8px; align-items: center; }
    #messageInput { flex: 1; padding: 12px 16px; border-radius: 25px; border: 1px solid rgba(45,90,227,0.4); background: rgba(0,0,0,0.3); color: white; font-size: 14px; outline: none; }
    .format-btn, .emoji-btn, .gif-btn, .poll-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 8px 12px; color: white; cursor: pointer; font-size: 16px; }
    .format-btn:hover, .emoji-btn:hover, .gif-btn:hover { background: rgba(45,90,227,0.3); border-color: #ffcc00; }
    .send-btn { background: linear-gradient(135deg, #2d5ae3, #1a3a8a); border: none; border-radius: 25px; padding: 12px 22px; color: white; font-weight: 600; cursor: pointer; font-size: 14px; }
    .send-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 12px rgba(45,90,227,0.4); }
    
    /* Emoji & GIF Pickers */
    .emoji-picker, .gif-picker { position: absolute; bottom: 90px; right: 20px; background: rgba(20,30,50,0.98); border: 1px solid rgba(45,90,227,0.4); border-radius: 15px; padding: 12px; display: none; z-index: 100; }
    .emoji-picker.show, .gif-picker.show { display: block; }
    .emoji-picker { display: none; grid-template-columns: repeat(8, 1fr); gap: 6px; width: 280px; max-height: 250px; overflow-y: auto; }
    .emoji-picker.show { display: grid; }
    .emoji-picker span { font-size: 22px; cursor: pointer; padding: 4px; text-align: center; }
    .emoji-picker span:hover { transform: scale(1.15); background: rgba(255,255,255,0.1); border-radius: 6px; }
    .gif-picker { width: 320px; max-height: 350px; overflow-y: auto; }
    .gif-search { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(45,90,227,0.4); background: rgba(0,0,0,0.3); color: white; margin-bottom: 10px; font-size: 13px; }
    .gif-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .gif-item { cursor: pointer; border-radius: 6px; overflow: hidden; }
    .gif-item img { width: 100%; height: 100%; object-fit: cover; }
    
    /* Members Sidebar */
    .members-sidebar { width: 240px; background: rgba(10,15,30,0.95); backdrop-filter: blur(10px); border-left: 1px solid rgba(45,90,227,0.3); padding: 15px; overflow-y: auto; }
    body.theme-light .members-sidebar { background: rgba(255,255,255,0.9); }
    .members-header { margin-bottom: 15px; color: #ffcc00; font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; }
    .member-category { color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; text-transform: uppercase; margin: 12px 0 6px; }
    .member-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; color: rgba(255,255,255,0.8); font-weight: 500; font-size: 13px; cursor: pointer; }
    .member-item:hover { color: white; }
    .member-avatar { width: 28px; height: 28px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; }
    .member-activity { font-size: 9px; color: rgba(255,255,255,0.4); margin-left: 4px; }
    
    /* Modals */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: rgba(20,30,50,0.98); border: 1px solid rgba(45,90,227,0.4); border-radius: 16px; padding: 22px; max-width: 380px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal h3 { color: #ffcc00; margin-bottom: 18px; font-size: 18px; }
    .modal input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(45,90,227,0.4); background: rgba(0,0,0,0.3); color: white; margin-bottom: 12px; font-size: 14px; }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
    .accept-btn { background: #00ff88; border: none; border-radius: 8px; padding: 8px 16px; color: #1a1a2e; font-weight: 600; cursor: pointer; }
    .decline-btn { background: #ff4444; border: none; border-radius: 8px; padding: 8px 16px; color: white; font-weight: 600; cursor: pointer; }
    
    /* Notifications */
    .notification-badge { position: fixed; bottom: 20px; right: 20px; background: #ff4444; color: white; padding: 12px 18px; border-radius: 30px; font-weight: 600; font-size: 14px; cursor: pointer; z-index: 1000; animation: slideIn 0.3s; display: none; box-shadow: 0 4px 15px rgba(255,68,68,0.3); }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    /* Settings Panel */
    .settings-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20,30,50,0.98); border: 1px solid rgba(45,90,227,0.4); border-radius: 16px; padding: 22px; width: 350px; max-height: 70vh; overflow-y: auto; z-index: 1000; display: none; }
    .settings-panel.show { display: block; }
    .settings-panel h3 { color: #ffcc00; margin-bottom: 18px; }
    .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .setting-item:last-child { border-bottom: none; }
    .streak-badge { display: inline-block; background: linear-gradient(135deg, #ff4400, #ff8800); padding: 2px 8px; border-radius: 15px; font-size: 10px; margin-left: 6px; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
    ::-webkit-scrollbar-thumb { background: #2d5ae3; border-radius: 10px; }
  </style>
</head>
<body class="theme-dark">
<div class="fantarena-container">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>🏟️ FANTARENA</h2>
      <select class="theme-selector" onchange="setTheme(this.value)">
        <option value="dark">🌙</option>
        <option value="light">☀️</option>
        <option value="amoled">⬛</option>
        <option value="cyberpunk">💜</option>
      </select>
    </div>
    <div class="server-list">
      <div class="server-item active" data-channel="general"><span>💬</span> general</div>
      <div class="server-item" data-channel="game-recs"><span>🎮</span> game-recs</div>
      <div class="server-item" data-channel="lfg"><span>👥</span> lfg</div>
      <div class="server-item" data-channel="flex"><span>🏆</span> flex</div>
    </div>
    <div class="pinned-messages" id="pinnedMessages"><div style="color:rgba(255,255,255,0.4);">📌 pinned</div><div id="pinnedList"></div></div>
    <div class="friends-header"><span>👥 friends</span><button class="add-friend-btn" onclick="showAddFriendModal()">+</button><span class="request-badge" id="requestBadge" style="display:none;" onclick="showRequestsModal()">0</span></div>
    <div id="friendsList"></div>
    <div class="friends-header" style="margin-top:5px;"><span>👥 groups</span><button class="add-friend-btn" onclick="showCreateGroupModal()">+</button></div>
    <div id="groupsList"></div>
    <div class="friends-header" style="margin-top:5px;"><span>🔖 saved</span></div>
    <div id="savedList"></div>
    <div style="margin-top: auto; padding: 15px;">
      <button onclick="window.location.href='index.html'" class="send-btn" style="width:100%; padding:8px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); font-size:13px;">← back</button>
    </div>
  </div>
  
  <div class="chat-main">
    <div class="chat-header">
      <h3 id="chatHeaderTitle"># general</h3>
      <span class="chat-header-info" id="chatHeaderInfo"></span>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="search..." oninput="searchMessages(this.value)">
        <button class="format-btn" onclick="openSettings()" style="padding:6px 10px;">⚙️</button>
      </div>
    </div>
    <div class="messages-container" id="messagesContainer"><div style="text-align:center; color:rgba(255,255,255,0.4);">loading...</div></div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="message-input-container">
      <div class="reply-bar" id="replyBar" style="display:none;"><span id="replyText"></span><button onclick="cancelReply()">✕</button></div>
      <div class="input-row">
        <button class="format-btn" onclick="applyFormat('**')">B</button>
        <button class="format-btn" onclick="applyFormat('*')"><i>I</i></button>
        <button class="format-btn" onclick="applyFormat('~~')"><s>S</s></button>
        <button class="format-btn" onclick="applyFormat('`')">&lt;/&gt;</button>
        <button class="emoji-btn" onclick="toggleEmojiPicker()">😊</button>
        <button class="gif-btn" onclick="toggleGifPicker()">GIF</button>
        <button class="poll-btn" onclick="createPoll()">📊</button>
        <input type="text" id="messageInput" placeholder="send a message..." onkeypress="handleKeyPress(event)" oninput="handleTyping()">
        <button class="send-btn" onclick="sendMessage()">send</button>
      </div>
    </div>
    <div class="emoji-picker" id="emojiPicker"></div>
    <div class="gif-picker" id="gifPicker">
      <input type="text" class="gif-search" id="gifSearch" placeholder="search gifs..." oninput="searchGifs(this.value)">
      <div class="gif-grid" id="gifGrid"></div>
    </div>
  </div>
  
  <div class="members-sidebar">
    <div class="members-header"><span>👥 members</span><span id="onlineCount">0 online</span></div>
    <div id="membersList"></div>
    <button class="send-btn" onclick="showProfileModal()" style="width:100%; margin-top:15px; padding:8px; font-size:13px;">edit profile</button>
  </div>
</div>

<!-- Settings Panel -->
<div class="settings-panel" id="settingsPanel">
  <h3>⚙️ settings</h3>
  <div class="setting-item"><span>🔊 sound effects</span><input type="checkbox" id="soundToggle" checked onchange="toggleSound()"></div>
  <div class="setting-item"><span>🎨 name color</span><input type="color" id="nameColorPicker" value="#ffcc00" onchange="setNameColor(this.value)"></div>
  <div class="setting-item"><span>🔥 streak</span><span id="streakDisplay">0 days</span></div>
  <button class="send-btn" onclick="closeSettings()" style="width:100%; margin-top:15px;">close</button>
</div>

<!-- Modals -->
<div class="modal-overlay" id="addFriendModal" onclick="if(event.target===this)closeAddFriendModal()"><div class="modal"><h3>add friend</h3><input type="text" id="friendUsernameInput" placeholder="username"><div class="modal-buttons"><button class="send-btn" onclick="sendFriendRequest()">send</button><button class="send-btn" onclick="closeAddFriendModal()" style="background:rgba(255,255,255,0.1);">cancel</button></div></div></div>
<div class="modal-overlay" id="requestsModal"><div class="modal"><h3>friend requests</h3><div id="requestsList"></div><div class="modal-buttons"><button class="send-btn" onclick="closeRequestsModal()">close</button></div></div></div>
<div class="modal-overlay" id="createGroupModal"><div class="modal"><h3>create group</h3><input type="text" id="groupNameInput" placeholder="group name"><div class="modal-buttons"><button class="send-btn" onclick="createGroup()">create</button><button class="send-btn" onclick="closeCreateGroupModal()" style="background:rgba(255,255,255,0.1);">cancel</button></div></div></div>
<div class="modal-overlay" id="profileModal"><div class="modal"><h3>your profile</h3><input type="text" id="profileBioInput" placeholder="bio" value="Just a gamer"><input type="text" id="profileStatusInput" placeholder="status" value="🎮 gaming"><div class="modal-buttons"><button class="send-btn" onclick="saveProfile()">save</button><button class="send-btn" onclick="closeProfileModal()" style="background:rgba(255,255,255,0.1);">cancel</button></div></div></div>

<div class="notification-badge" id="notificationBadge" onclick="openDMFromNotification()"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== CONFIG =====
const SUPABASE_URL = "https://luxutkabqgitoteosctr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1eHV0a2FicWdpdG90ZW9zY3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2Mjc5NjAsImV4cCI6MjA5MjIwMzk2MH0.7GjvQMZaujg0YFmTBr2wotGWCIUoBWCBplGocMo6TDM";
const GIPHY_API_KEY = "9a6B8zN3vLSqn6mqk9P1s9jGmJIVqXUz";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
let currentChannel = 'general', currentDM = null, currentGroup = null, messages = [], friends = [], groups = [], pinned = [], bookmarks = [];
let typingTimeout = null, typingUsers = new Map(), replyingTo = null, soundEnabled = true, nameColor = '#ffcc00';
let streak = parseInt(localStorage.getItem('fanter_streak') || '0');

if (!currentUser || currentUser.username === 'Guest') { alert('please log in!'); window.location.href = 'fantaccount.html'; }

// ===== THEMES =====
function setTheme(theme) { document.body.className = `theme-${theme}`; localStorage.setItem('fantarena_theme', theme); }
const savedTheme = localStorage.getItem('fantarena_theme') || 'dark';
setTheme(savedTheme);
document.querySelector('.theme-selector').value = savedTheme;

// ===== STREAK =====
function updateStreak() {
  const lastLogin = localStorage.getItem('fanter_last_login') || new Date().toDateString();
  const today = new Date().toDateString();
  if (lastLogin !== today) {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    streak = (lastLogin === yesterday.toDateString()) ? streak + 1 : 1;
    localStorage.setItem('fanter_streak', streak);
    localStorage.setItem('fanter_last_login', today);
  }
  document.getElementById('streakDisplay').textContent = `${streak} day${streak !== 1 ? 's' : ''}`;
}
updateStreak();

// ===== SOUNDS =====
const sounds = { send: new Audio('https://www.soundjay.com/misc/sounds/message-sent-1.mp3'), receive: new Audio('https://www.soundjay.com/misc/sounds/message-received-1.mp3'), ping: new Audio('https://www.soundjay.com/misc/sounds/ding-1.mp3') };
function playSound(type) { if (soundEnabled && sounds[type]) { sounds[type].volume = 0.2; sounds[type].play().catch(() => {}); } }
function toggleSound() { soundEnabled = document.getElementById('soundToggle').checked; }

// ===== PRESENCE =====
async function updatePresence(status = 'online', activity = null) { 
  try { await supabaseClient.from('fanter_presence').upsert({ user_id: currentUser.id, username: currentUser.displayName || currentUser.username, status, activity, last_seen: new Date() }); } catch (e) {} 
}
updatePresence(); setInterval(() => updatePresence('online', currentChannel ? `in #${currentChannel}` : 'in fantarena'), 30000);

// ===== MESSAGES =====
async function loadMessages() {
  let query = supabaseClient.from('fanter_chat').select('*').order('created_at', { ascending: true }).limit(100);
  if (currentDM) query = query.eq('channel_id', `dm_${[currentUser.id, currentDM].sort().join('_')}`);
  else if (currentGroup) query = query.eq('channel_id', `group_${currentGroup}`);
  else query = query.eq('channel_id', currentChannel);
  const { data } = await query;
  if (data) { messages = data; renderMessages(); }
}

function renderMessages() {
  const container = document.getElementById('messagesContainer');
  if (messages.length === 0) { container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.4);">no messages yet</div>'; return; }
  container.innerHTML = messages.map(msg => {
    const isMe = msg.user_id === currentUser.id;
    const isMentioned = msg.message.includes(`@${currentUser.displayName}`) || msg.message.includes(`@${currentUser.username}`);
    if (isMentioned && !isMe) { playSound('ping'); showNotification(`@${msg.username} mentioned you`, msg.user_id); }
    return `<div class="message" data-message-id="${msg.id}" style="${isMentioned ? 'background:rgba(255,204,0,0.1);border-left:3px solid #ffcc00;' : ''}">
      <div class="message-avatar" onclick="showProfile('${msg.user_id}')">${msg.username[0].toUpperCase()}</div>
      <div class="message-content">
        <div class="message-header">
          <span class="message-name" style="color:${nameColor}" onclick="showProfile('${msg.user_id}')">${msg.username}</span>
          <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
          ${msg.edited ? '<span class="message-edited">(edited)</span>' : ''}
        </div>
        <div class="message-text">${formatMessage(msg.message)}</div>
        <div class="message-actions">
          <button class="message-action-btn" onclick="replyToMessage('${msg.id}', '${msg.username}', '${msg.message.substring(0,30)}')">↩️</button>
          <button class="message-action-btn" onclick="bookmarkMessage('${msg.id}')">🔖</button>
          <button class="message-action-btn" onclick="pinMessage('${msg.id}')">📌</button>
          <button class="message-action-btn" onclick="inviteToGame('${msg.user_id}')">🎮</button>
          ${isMe ? `<button class="message-action-btn" onclick="editMessage('${msg.id}', \`${msg.message.replace(/`/g,'\\`').replace(/'/g,"\\'")}\`)">✏️</button><button class="message-action-btn" onclick="deleteMessage('${msg.id}')">🗑️</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function formatMessage(text) {
  return text.replace(/@(\w+)/g, '<span class="mention" onclick="openDMByName(\'$1\')">@$1</span>')
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>')
            .replace(/~~(.*?)~~/g, '<s>$1</s>').replace(/`(.*?)`/g, '<code>$1</code>');
}

async function sendMessage() {
  const input = document.getElementById('messageInput'); 
  let message = input.value.trim(); 
  if (!message) return;
  
  if (message.startsWith('/')) { handleCommand(message); input.value = ''; return; }
  
  const channelId = currentDM ? `dm_${[currentUser.id, currentDM].sort().join('_')}` : currentGroup ? `group_${currentGroup}` : currentChannel;
  await supabaseClient.from('fanter_chat').insert({ user_id: currentUser.id, username: currentUser.displayName || currentUser.username, message, channel_id: channelId, reply_to: replyingTo?.id || null });
  
  playSound('send');
  input.value = ''; cancelReply(); clearTyping();
}

function handleCommand(cmd) {
  const [command, ...args] = cmd.slice(1).split(' ');
  if (command === 'game' && args[0]) {
    const game = window.gamesData?.find(g => g.name.toLowerCase().includes(args.join(' ').toLowerCase()));
    document.getElementById('messageInput').value = game ? `🎮 ${game.name}: ${window.location.origin}/play.html?gameurl=${encodeURIComponent(game.url)}` : `Game not found`;
  } else if (command === 'roll') {
    document.getElementById('messageInput').value = `🎲 rolled ${Math.floor(Math.random() * 100) + 1}`;
  } else if (command === '8ball') {
    const answers = ['yes', 'no', 'maybe', 'ask again', 'definitely', 'doubtful'];
    document.getElementById('messageInput').value = `🎱 ${answers[Math.floor(Math.random() * answers.length)]}`;
  }
}

// ===== GIFS (GIPHY) =====
async function searchGifs(query) {
  if (!query) query = 'trending';
  const res = await fetch(`https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_API_KEY}&q=${query}&limit=10`);
  const data = await res.json();
  document.getElementById('gifGrid').innerHTML = data.data.map(g => `<div class="gif-item" onclick="sendGif('${g.images.fixed_height.url}')"><img src="${g.images.fixed_height_small.url}"></div>`).join('');
}
function sendGif(url) { document.getElementById('messageInput').value = url; sendMessage(); document.getElementById('gifPicker').classList.remove('show'); }
function toggleGifPicker() { document.getElementById('gifPicker').classList.toggle('show'); searchGifs('trending'); }

// ===== EMOJI =====
function toggleEmojiPicker() { document.getElementById('emojiPicker').classList.toggle('show'); }
function insertEmoji(emoji) { document.getElementById('messageInput').value += emoji; document.getElementById('emojiPicker').classList.remove('show'); }

// ===== PINNED & BOOKMARKS =====
async function pinMessage(msgId) {
  const msg = messages.find(m => m.id == msgId); if (!msg) return;
  await supabaseClient.from('fanter_pinned').insert({ channel_id: currentChannel, message_id: msgId, content: msg.message.substring(0, 100), username: msg.username });
  loadPinned();
}
async function loadPinned() {
  const { data } = await supabaseClient.from('fanter_pinned').select('*').eq('channel_id', currentChannel);
  pinned = data || [];
  document.getElementById('pinnedList').innerHTML = pinned.map(p => `<div class="pinned-item" onclick="scrollToMessage('${p.message_id}')"><span>📌</span> ${p.content.substring(0,40)}</div>`).join('');
}
function bookmarkMessage(msgId) {
  const msg = messages.find(m => m.id == msgId); if (!msg) return;
  bookmarks.push(msg); localStorage.setItem('fanter_bookmarks', JSON.stringify(bookmarks)); loadBookmarks();
}
function loadBookmarks() {
  bookmarks = JSON.parse(localStorage.getItem('fanter_bookmarks') || '[]');
  document.getElementById('savedList').innerHTML = bookmarks.length ? bookmarks.map(b => `<div class="friend-item" onclick="scrollToMessage('${b.id}')">🔖 ${b.message.substring(0,20)}</div>`).join('') : '<div style="padding:8px;color:rgba(255,255,255,0.4);font-size:12px;">no bookmarks</div>';
}

// ===== SEARCH =====
function searchMessages(query) {
  if (!query) { renderMessages(); return; }
  const filtered = messages.filter(m => m.message.toLowerCase().includes(query.toLowerCase()));
  const container = document.getElementById('messagesContainer');
  container.innerHTML = filtered.map(msg => `<div class="message" style="opacity:0.8"><div class="message-avatar">${msg.username[0].toUpperCase()}</div><div class="message-content"><span class="message-name">${msg.username}</span> <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span><div>${msg.message}</div></div></div>`).join('');
}

// ===== UI HELPERS =====
function applyFormat(wrapper) {
  const input = document.getElementById('messageInput');
  const start = input.selectionStart, end = input.selectionEnd;
  const text = input.value, selected = text.substring(start, end);
  input.value = text.substring(0, start) + wrapper + selected + wrapper + text.substring(end);
  input.focus(); input.setSelectionRange(start + wrapper.length, end + wrapper.length);
}
function openSettings() { document.getElementById('settingsPanel').classList.add('show'); }
function closeSettings() { document.getElementById('settingsPanel').classList.remove('show'); }
function setNameColor(color) { nameColor = color; localStorage.setItem('fanter_nameColor', color); renderMessages(); }
function showNotification(msg, from) { 
  const badge = document.getElementById('notificationBadge'); badge.textContent = msg; badge.style.display = 'block'; badge.setAttribute('data-from', from);
  setTimeout(() => badge.style.display = 'none', 5000);
}
function openDMFromNotification() { const from = document.getElementById('notificationBadge').getAttribute('data-from'); if (from) openDM(from, 'User'); }
function createPoll() { document.getElementById('messageInput').value = '📊 Poll: '; document.getElementById('messageInput').focus(); }
function inviteToGame(userId) { openDM(userId, 'User'); document.getElementById('messageInput').value = '🎮 want to play? '; }

// ===== INIT =====
const emojis = ['😀','😂','😊','😍','🥰','😎','🤔','😭','🔥','💀','🎮','🏆','⭐','💬','👑','✨'];
document.getElementById('emojiPicker').innerHTML = emojis.map(e => `<span onclick="insertEmoji('${e}')">${e}</span>`).join('');

loadMessages(); loadPinned(); loadBookmarks(); setupRealtime(); loadFriends(); loadMembers(); loadFriendRequests();
setInterval(loadMembers, 10000); setInterval(loadFriendRequests, 30000);

const savedColor = localStorage.getItem('fanter_nameColor');
if (savedColor) { nameColor = savedColor; document.getElementById('nameColorPicker').value = savedColor; }

// Make functions global
window.setTheme = setTheme; window.sendMessage = sendMessage; window.handleKeyPress = (e) => { if (e.key === 'Enter') sendMessage(); };
window.applyFormat = applyFormat; window.toggleEmojiPicker = toggleEmojiPicker; window.insertEmoji = insertEmoji;
window.toggleGifPicker = toggleGifPicker; window.searchGifs = searchGifs; window.sendGif = sendGif;
window.openSettings = openSettings; window.closeSettings = closeSettings; window.toggleSound = toggleSound; window.setNameColor = setNameColor;
window.showAddFriendModal = () => document.getElementById('addFriendModal').classList.add('show');
window.closeAddFriendModal = () => document.getElementById('addFriendModal').classList.remove('show');
window.showCreateGroupModal = () => document.getElementById('createGroupModal').classList.add('show');
window.closeCreateGroupModal = () => document.getElementById('createGroupModal').classList.remove('show');
window.showProfileModal = () => document.getElementById('profileModal').classList.add('show');
window.closeProfileModal = () => document.getElementById('profileModal').classList.remove('show');
window.createPoll = createPoll; window.bookmarkMessage = bookmarkMessage; window.pinMessage = pinMessage; window.inviteToGame = inviteToGame;
window.openDMFromNotification = openDMFromNotification;

console.log('🏟️ Fantarena loaded with GIPHY!');
</script>
