<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fanter | account</title>
  <link rel="stylesheet" href="config/main.css" />
  <script src="config/theme-loader.js"></script>
  <style>
    .account-container { max-width: 1000px; margin: 100px auto; padding: 30px; background: rgba(20, 30, 50, 0.8); border-radius: 20px; border: 1px solid rgba(45, 90, 227, 0.4); }
    .account-tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; flex-wrap: wrap; }
    .account-tab { background: none; border: none; color: rgba(255,255,255,0.6); padding: 10px 20px; cursor: pointer; font-size: 16px; transition: all 0.3s ease; border-radius: 8px; }
    .account-tab:hover { background: rgba(255,255,255,0.05); }
    .account-tab.active { color: #ffcc00; background: rgba(255,204,0,0.1); border-bottom: 2px solid #ffcc00; }
    .account-tab-content { display: none; }
    .account-tab-content.active { display: block; }
    .account-form { display: flex; flex-direction: column; gap: 15px; text-align: left; max-width: 400px; margin: 0 auto; }
    .account-form input { padding: 12px; border-radius: 10px; border: 1px solid rgba(45, 90, 227, 0.4); background: rgba(0,0,0,0.3); color: white; font-size: 14px; }
    .account-form input:focus { outline: none; border-color: #ffcc00; }
    .profile-info { text-align: center; margin-bottom: 20px; }
    .profile-avatar { width: 100px; height: 100px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto 15px; font-weight: bold; }
    .profile-stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-number { font-size: 24px; font-weight: bold; color: #ffcc00; }
    .stat-label { font-size: 12px; color: rgba(255,255,255,0.6); }
    .message { padding: 10px; border-radius: 8px; margin-top: 15px; text-align: center; font-size: 14px; }
    .message.error { background: rgba(255,0,0,0.2); color: #ff6666; }
    .message.success { background: rgba(0,255,0,0.2); color: #66ff66; }
    .settings-btn { background: rgba(45, 90, 227, 0.3); border: 1px solid rgba(45, 90, 227, 0.5); color: white; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s ease; width: 100%; }
    .settings-btn:hover { background: rgba(45, 90, 227, 0.5); transform: translateY(-2px); }
    .logout-btn { background: rgba(220, 50, 50, 0.2); border-color: rgba(220, 50, 50, 0.5); }
    .logout-btn:hover { background: rgba(220, 50, 50, 0.4); }
    .divider { height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0; }
    .sync-status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; margin-left: 10px; }
    .sync-status.online { background: rgba(0,255,0,0.2); color: #00ff88; }
    .sync-status.offline { background: rgba(255,165,0,0.2); color: #ffa500; }
    .guest-message { text-align: center; padding: 40px; }
    .leaderboard-filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; transition: all 0.3s ease; }
    .filter-btn.active { background: rgba(255,204,0,0.2); border-color: #ffcc00; color: #ffcc00; }
    .leaderboard-list { display: flex; flex-direction: column; gap: 10px; }
    .leaderboard-item { display: flex; align-items: center; gap: 15px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
    .leaderboard-item:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
    .rank { font-size: 20px; font-weight: bold; min-width: 40px; color: rgba(255,255,255,0.5); }
    .rank.top-1 { color: #ffcc00; }
    .rank.top-2 { color: #c0c0c0; }
    .rank.top-3 { color: #cd7f32; }
    .user-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; }
    .user-info { flex: 1; }
    .user-name { font-size: 16px; font-weight: bold; }
    .user-username { font-size: 12px; color: rgba(255,255,255,0.5); }
    .ach-group { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; margin-bottom: 20px; overflow: hidden; }
    .ach-group-header { padding: 15px 20px; background: rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
    .ach-group-header:hover { background: rgba(0,0,0,0.3); }
    .ach-group-body { padding: 15px 20px; display: flex; flex-direction: column; gap: 10px; }
    .ach-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 12px; border-left: 3px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); transition: all 0.2s ease; }
    .ach-item.unlocked { background: rgba(255,204,0,0.08); border-left-color: #ffcc00; }
    .ach-item-icon { font-size: 28px; min-width: 40px; text-align: center; }
    .ach-item-info { flex: 1; }
    .ach-item-name { font-size: 13px; font-weight: bold; color: white; }
    .ach-item-desc { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .ach-progress-bar-wrap { height: 3px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 6px; overflow: hidden; }
    .ach-progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .ach-item-coins { font-size: 11px; color: #ffcc00; white-space: nowrap; }
  </style>
</head>

      <button class="account-tab active" data-tab="profile">my profile</button>

      <button class="account-tab" data-tab="leaderboard">🏅 leaderboard</button>
      <button class="account-tab" data-tab="login">login</button>
      <button class="account-tab" data-tab="register">register</button>
    </div>

    <div id="loginTab" class="account-tab-content">
      <form id="loginForm" class="account-form">
        <input type="email" id="loginEmail" placeholder="email" required>
        <input type="password" id="loginPassword" placeholder="password" required>
        <button type="submit" class="settings-btn">login</button>
        <div id="loginMessage" class="message"></div>
      </form>
      <div style="text-align:center;margin-top:20px;">
        <p style="opacity:0.7;font-size:14px;">or</p>
        <button onclick="continueWithLocalStorage()" class="settings-btn" style="margin-top:10px;">continue with local save</button>
      </div>
    </div>

    <div id="registerTab" class="account-tab-content">
      <form id="registerForm" class="account-form">
        <input type="text" id="regUsername" placeholder="username" required>
        <input type="email" id="regEmail" placeholder="email" required>
        <input type="text" id="regDisplayName" placeholder="display name (optional)">
        <input type="password" id="regPassword" placeholder="password" required>
        <input type="password" id="regConfirmPassword" placeholder="confirm password" required>
        <button type="submit" class="settings-btn">register</button>
        <div id="registerMessage" class="message"></div>
      </form>

    ];

    // ===== STATE =====
    let currentUser = null;
    let localUser = null;
    let syncStatus = 'offline';
    let currentFilter = 'coins';
    let userAchievements = {};

    // ===== INIT =====
    async function init() {
      if (!localStorage.getItem('fanter_currentUser')) {
        const guestUser = {
          id: 'guest_' + Date.now(),
          username: 'Guest',
          displayName: 'Guest',
          coins: 300,
          stats: { gamesPlayed: 0, ratingsGiven: 0, favoritesCount: 0 },
          favorites: [],
          playedGames: []
        };
        localStorage.setItem('fanter_currentUser', JSON.stringify(guestUser));
      }

      // Try Supabase if available
      if (window.supabase && window.supabase.auth) {
        try {
          const { data: { session } } = await window.supabase.auth.getSession();
          if (session) {
            currentUser = session.user;
            syncStatus = 'online';
            await loadSupabaseData();
          } else {
            loadLocalData();
          }
        } catch (e) {
          console.log('Supabase error, using localStorage');
          loadLocalData();
        }
      } else {
        loadLocalData();
      }

      setupTabs();
      setupLeaderboardFilters();
      updateUI();
      renderCurrentTab();
    }

    function loadLocalData() {
      localUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
      userAchievements = JSON.parse(localStorage.getItem('fanter_achievements') || '{}');
      syncStatus = 'offline';
    }

    async function loadSupabaseData() {
      try {
        const { data: profile } = await window.supabase.from('profiles').select('*').eq('id', currentUser.id).single();
        if (profile) {
          localUser = {
            id: profile.id,
            username: profile.username,
            displayName: profile.display_name,
            email: profile.email,
            coins: profile.coins || 300,
            stats: { gamesPlayed: profile.games_played || 0, ratingsGiven: 0, favoritesCount: 0 },
            favorites: [],
            playedGames: []
          };
        }
        const { data: achievements } = await window.supabase.from('user_achievements').select('achievement_id').eq('user_id', currentUser.id);
        userAchievements = {};
        achievements?.forEach(a => { userAchievements[a.achievement_id] = true; });
      } catch (error) {
        console.error('Error loading Supabase data:', error);
        loadLocalData();
      }
    }

    // ===== AUTH =====
    async function handleLogin(email, password) {
      if (!window.supabase) {
        showMessage('loginMessage', 'Supabase not available', 'error');
        return;
      }
      try {
        const { data, error } = await window.supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        currentUser = data.user;
        syncStatus = 'online';
        await loadSupabaseData();
        showMessage('loginMessage', 'Login successful!', 'success');
        setTimeout(() => window.location.reload(), 1000);
      } catch (error) {
        showMessage('loginMessage', error.message, 'error');
      }
    }

    async function handleRegister(username, email, displayName, password) {
      if (!window.supabase) {
        showMessage('registerMessage', 'Supabase not available', 'error');
        return;
      }
      try {
        const localUsers = JSON.parse(localStorage.getItem('fanter_users') || '[]');
        if (localUsers.find(u => u.username && u.username.toLowerCase() === username.toLowerCase())) {
          showMessage('registerMessage', '❌ Username already taken!', 'error');
          return;
        }

        const { data: existingUser } = await window.supabase.from('profiles').select('username').ilike('username', username).single();
        if (existingUser) {
          showMessage('registerMessage', '❌ Username already taken!', 'error');
          return;
        }

        const { data, error } = await window.supabase.auth.signUp({
          email, password,
          options: { data: { username, display_name: displayName || username } }
        });

        if (error) throw error;

        if (data.user) {
          await window.supabase.from('profiles').insert({
            id: data.user.id,
            username: username,
            display_name: displayName || username,
            email: email,
            coins: 300,
            games_played: 0,
            achievements_count: 0
          });
        }

        showMessage('registerMessage', '✅ Account created! Check your email.', 'success');
      } catch (error) {
        showMessage('registerMessage', error.message, 'error');
      }
    }

    async function handleLogout() {
      if (window.supabase) await window.supabase.auth.signOut();
      currentUser = null;
      syncStatus = 'offline';
      loadLocalData();
      updateUI();
      switchTab('profile');
    }

    function continueWithLocalStorage() {
      loadLocalData();
      updateUI();
      switchTab('profile');
    }

    // ===== RENDER PROFILE =====
    function renderProfile() {
      const container = document.getElementById('profileContent');
      const user = localUser;
      if (!user) {
        container.innerHTML = `<div class="guest-message"><p>you're browsing as a guest</p><button onclick="switchTab('register')" class="settings-btn" style="width:auto;padding:10px 30px;margin-top:15px;">create account</button></div>`;
        return;
      }
      const displayName = user.displayName || user.username || 'User';
      const username = user.username || displayName.toLowerCase();
      const coins = user.coins || 300;
      const stats = user.stats || { gamesPlayed: 0, ratingsGiven: 0, favoritesCount: 0 };
      const favorites = user.favorites || [];
      const unlockedCount = Object.keys(userAchievements).length;
      const statusDot = syncStatus === 'online' ? '🟢' : '🟠';
      const statusText = syncStatus === 'online' ? 'Supabase' : 'Local';

      container.innerHTML = `
        <div class="profile-info">
          <div class="profile-avatar">${displayName[0].toUpperCase()}</div>
          <h2>${displayName} <span class="sync-status ${syncStatus}">${statusDot} ${statusText}</span></h2>
          <p style="opacity:0.7;">@${username}</p>
          <div style="font-size:20px;font-weight:bold;color:#ffcc00;margin-top:8px;">🪙 ${Math.floor(coins * 100) / 100}</div>
        </div>
        <div class="profile-stats">
          <div class="stat"><div class="stat-number">${stats.gamesPlayed || 0}</div><div class="stat-label">Games</div></div>
          <div class="stat"><div class="stat-number">${stats.ratingsGiven || 0}</div><div class="stat-label">Ratings</div></div>
          <div class="stat"><div class="stat-number">${favorites.length}</div><div class="stat-label">Favorites</div></div>
          <div class="stat"><div class="stat-number">${unlockedCount}</div><div class="stat-label">Achievements</div></div>
        </div>
        <div class="divider"></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button class="settings-btn" onclick="switchTab('achievements')">view achievements</button>
          <button class="settings-btn logout-btn" onclick="handleLogout()">${currentUser ? 'Logout' : 'Clear'}</button>
        </div>`;
    }

    // ===== RENDER ACHIEVEMENTS =====
    function renderAchievements() {
      const container = document.getElementById('achievementsContent');
      if (!localUser) {
        container.innerHTML = `<div class="guest-message"><p>please log in to view achievements</p><button onclick="switchTab('login')" class="settings-btn" style="width:auto;padding:10px 30px;margin-top:15px;">log in</button></div>`;
        return;
      }

      const stats = localUser.stats || { gamesPlayed: 0, ratingsGiven: 0, favoritesCount: 0 };
      const unlockedCount = Object.keys(userAchievements).length;
      const totalCount = ALL_ACHIEVEMENTS.length;
      const pct = Math.round((unlockedCount / totalCount) * 100);

      const newbie = ALL_ACHIEVEMENTS.filter(a => a.id >= 1 && a.id <= 10);
      const beginner = ALL_ACHIEVEMENTS.filter(a => a.id >= 11 && a.id <= 20);
      const climbing = ALL_ACHIEVEMENTS.filter(a => a.id >= 21 && a.id <= 30);
      const difficult = ALL_ACHIEVEMENTS.filter(a => a.id >= 31 && a.id <= 40);
      const elite = ALL_ACHIEVEMENTS.filter(a => a.id >= 41 && a.id <= 50);
      const secrets = ALL_ACHIEVEMENTS.filter(a => a.id >= 51 && a.id <= 63);

      function getProgress(a) {
        if (userAchievements[a.id]) return { done: true, current: a.required, pct: 100 };
        if (a.req === 'secret' || a.req === 'register') return { done: false, current: 0, pct: 0 };
        const val = stats[a.req] || 0;
        return { done: false, current: Math.min(val, a.required), pct: Math.min(100, Math.round((val / a.required) * 100)) };
      }

      function renderGroup(title, icon, color, achievements, startOpen) {
        const groupUnlocked = achievements.filter(a => userAchievements[a.id]).length;
        const groupPct = Math.round((groupUnlocked / achievements.length) * 100);
        const groupId = 'ach-group-' + title.replace(/\s+/g, '-');

        const items = achievements.map(a => {
          const p = getProgress(a);
          const isHidden = a.req === 'secret' && !p.done;
          return `
            <div class="ach-item ${p.done ? 'unlocked' : ''}">
              <div class="ach-item-icon" style="${!p.done ? 'filter:grayscale(0.6);opacity:0.7;' : ''}">${isHidden ? '❓' : a.icon}</div>
              <div class="ach-item-info">
                <div class="ach-item-name">${isHidden ? '???' : a.name}</div>
                <div class="ach-item-desc">${isHidden ? 'hidden — keep playing to discover' : a.desc}</div>
                ${p.done ? '<div style="font-size:10px;color:#ffcc00;margin-top:3px;">✓ unlocked</div>' : ''}
                ${!p.done && !isHidden ? `<div class="ach-progress-bar-wrap"><div class="ach-progress-bar-fill" style="width:${p.pct}%;background:${color};"></div></div><div style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:3px;">${p.current} / ${a.required}</div>` : ''}
              </div>
              <div class="ach-item-coins">+${a.coins} 🪙</div>
            </div>`;
        }).join('');

        return `
          <div class="ach-group">
            <div class="ach-group-header" onclick="var b=document.getElementById('${groupId}');b.style.display=b.style.display==='none'?'flex':'none';this.querySelector('.ach-arrow').textContent=b.style.display==='none'?'▼':'▲';">
              <div style="display:flex;align-items:center;gap:10px;"><span style="font-size:22px;">${icon}</span><span style="font-size:15px;font-weight:bold;color:white;font-family:'Orbitron',monospace;">${title}</span></div>
              <div style="display:flex;align-items:center;gap:15px;">
                <div style="text-align:right;"><div style="font-size:12px;color:${color};">${groupUnlocked}/${achievements.length}</div><div style="width:80px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:4px;overflow:hidden;"><div style="height:100%;width:${groupPct}%;background:${color};border-radius:2px;"></div></div></div>
                <span class="ach-arrow" style="color:rgba(255,255,255,0.5);font-size:12px;">${startOpen ? '▲' : '▼'}</span>
              </div>
            </div>
            <div class="ach-group-body" id="${groupId}" style="display:${startOpen ? 'flex' : 'none'};flex-direction:column;gap:10px;">${items}</div>
          </div>`;
      }

      container.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;margin-bottom:25px;">
          <div><div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:6px;">overall progress</div><div style="width:260px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#ffcc00,#ffaa00);border-radius:4px;transition:width 0.4s ease;"></div></div><div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;">${unlockedCount} of ${totalCount} unlocked (${pct}%)</div></div>
          <div style="background:rgba(255,204,0,0.15);border:1px solid rgba(255,204,0,0.3);border-radius:30px;padding:10px 20px;text-align:center;"><div style="font-size:28px;font-weight:bold;color:#ffcc00;font-family:'Orbitron',monospace;">${unlockedCount}</div><div style="font-size:11px;color:rgba(255,255,255,0.5);">achievements</div></div>
        </div>
        ${renderGroup('Newbie', '🌱', '#00ff88', newbie, true)}
        ${renderGroup('Beginner', '📈', '#2d5ae3', beginner, false)}
        ${renderGroup('Climbing', '⛰️', '#ff8800', climbing, false)}
        ${renderGroup('Difficult', '💀', '#ff4444', difficult, false)}
        ${renderGroup('Elite', '👑', '#ffcc00', elite, false)}
        ${renderGroup('Secrets', '🔮', '#aa44ff', secrets, false)}
      `;
    }

    // ===== RENDER LEADERBOARD =====
    async function renderLeaderboard() {
      const container = document.getElementById('leaderboardList');
      container.innerHTML = '<div class="guest-message">loading leaderboard...</div>';
      let players = [];

      if (window.supabase) {
        try {
          const orderCol = currentFilter === 'coins' ? 'coins' : currentFilter === 'games_played' ? 'games_played' : 'achievements_count';
          const { data, error } = await window.supabase.from('profiles').select('id, username, display_name, coins, games_played, achievements_count').order(orderCol, { ascending: false }).limit(20);
          if (!error && data) {
            players = data.map(p => ({ id: p.id, displayName: p.display_name || p.username || 'Unknown', username: p.username || 'unknown', coins: p.coins || 0, gamesPlayed: p.games_played || 0, achievementsCount: p.achievements_count || 0, isLocal: false }));
          }
        } catch (e) {
          console.warn('Using local fallback:', e);
        }
      }

      if (players.length === 0) {
        const localUsers = JSON.parse(localStorage.getItem('fanter_users') || '[]');
        players = localUsers.map(u => ({ id: u.id, displayName: u.displayName || u.username || 'User', username: u.username || 'user', coins: u.coins || 0, gamesPlayed: u.stats?.gamesPlayed || 0, achievementsCount: Object.keys(JSON.parse(localStorage.getItem('fanter_achievements') || '{}')).length, isLocal: true }));
        if (localUser && !players.find(p => p.id === localUser.id)) {
          players.push({ id: localUser.id, displayName: localUser.displayName || localUser.username || 'You', username: localUser.username || 'you', coins: localUser.coins || 0, gamesPlayed: localUser.stats?.gamesPlayed || 0, achievementsCount: Object.keys(userAchievements).length, isLocal: true });
        }
        players.sort((a, b) => currentFilter === 'coins' ? b.coins - a.coins : currentFilter === 'games_played' ? b.gamesPlayed - a.gamesPlayed : b.achievementsCount - a.achievementsCount);
      }

      if (players.length === 0) {
        container.innerHTML = '<div class="guest-message">no players yet — be the first!</div>';
        return;
      }

      const rankIcons = ['🥇', '🥈', '🥉'];
      const currentUserId = localUser ? localUser.id : null;

      container.innerHTML = players.map((player, idx) => {
        const rank = idx + 1;
        const rankDisplay = rank <= 3 ? rankIcons[rank - 1] : `#${rank}`;
        const isMe = player.id === currentUserId;
        const scoreValue = currentFilter === 'coins' ? `🪙 ${Math.floor(player.coins * 100) / 100}` : currentFilter === 'games_played' ? `🎮 ${player.gamesPlayed}` : `🏆 ${player.achievementsCount}`;
        return `<div class="leaderboard-item" style="${isMe ? 'background:rgba(255,204,0,0.1);border:1px solid rgba(255,204,0,0.4);' : ''}"><div class="rank ${rank===1?'top-1':rank===2?'top-2':rank===3?'top-3':''}">${rankDisplay}</div><div class="user-avatar">${player.displayName[0].toUpperCase()}</div><div class="user-info"><div class="user-name">${player.displayName} ${isMe ? '<span style="font-size:11px;color:#ffcc00;">(you)</span>' : ''}</div><div class="user-username">@${player.username}${player.isLocal ? ' · local save' : ''}</div></div><div style="font-size:18px;font-weight:bold;color:#ffcc00;">${scoreValue}</div></div>`;
      }).join('');
    }

    // ===== UI HELPERS =====
    function setupTabs() {
      document.querySelectorAll('.account-tab').forEach(tab => tab.addEventListener('click', () => switchTab(tab.getAttribute('data-tab'))));
      document.getElementById('loginForm')?.addEventListener('submit', async (e) => { e.preventDefault(); await handleLogin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); });
      document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw = document.getElementById('regPassword').value;
        if (pw !== document.getElementById('regConfirmPassword').value) { showMessage('registerMessage', 'Passwords do not match', 'error'); return; }
        await handleRegister(document.getElementById('regUsername').value, document.getElementById('regEmail').value, document.getElementById('regDisplayName').value, pw);
      });
    }

    function setupLeaderboardFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.getAttribute('data-filter'); renderLeaderboard(); }));
    }

    function switchTab(tabName) {
      document.querySelectorAll('.account-tab').forEach(t => t.classList.toggle('active', t.getAttribute('data-tab') === tabName));
      document.querySelectorAll('.account-tab-content').forEach(c => c.classList.toggle('active', c.id === `${tabName}Tab`));
      renderCurrentTab();
    }

    function renderCurrentTab() {
      const active = document.querySelector('.account-tab-content.active');
      if (!active) return;
      if (active.id === 'profileTab') renderProfile();
      else if (active.id === 'achievementsTab') renderAchievements();
      else if (active.id === 'leaderboardTab') renderLeaderboard();
    }

    function updateUI() {
      const nameEl = document.getElementById('accountName');
      const user = localUser;
      if (user) {
        nameEl.textContent = user.displayName || user.username || 'User';
        document.querySelectorAll('.account-tab').forEach(t => { if (t.getAttribute('data-tab') === 'login' || t.getAttribute('data-tab') === 'register') t.style.display = 'none'; });
      } else {
        nameEl.textContent = 'Guest';
        document.querySelectorAll('.account-tab').forEach(t => t.style.display = 'block');
      }
    }

    function showMessage(elId, msg, type) {
      const el = document.getElementById(elId);
      if (el) { el.textContent = msg; el.className = `message ${type}`; }
    }

    window.switchTab = switchTab;
    window.handleLogout = handleLogout;
    window.continueWithLocalStorage = continueWithLocalStorage;

    init();
  </script>
</body>
</html>
