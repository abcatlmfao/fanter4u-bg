    /* ===== ALL STYLES ===== */
    .account-container {
      max-width: 1000px;
      margin: 100px auto;
      padding: 30px;
      background: rgba(20, 30, 50, 0.8);
      border-radius: 20px;
      border: 1px solid rgba(45, 90, 227, 0.4);
    }
    
    .account-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
      flex-wrap: wrap;
    }
    
    .account-tab {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      padding: 10px 20px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
      border-radius: 8px;
    }
    
    .account-tab:hover {
      background: rgba(255,255,255,0.05);
    }
    
    .account-tab.active {
      color: #ffcc00;
      background: rgba(255,204,0,0.1);
      border-bottom: 2px solid #ffcc00;
    }
    
    .account-tab-content {
      display: none;
    }
    
    .account-tab-content.active {
      display: block;
    }
    
    .account-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      text-align: left;
      max-width: 400px;
      margin: 0 auto;
    }
    
    .account-form input {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(45, 90, 227, 0.4);
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 14px;
    }
    
    .account-form input:focus {
      outline: none;
      border-color: #ffcc00;
    }
    
    .profile-info {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .profile-avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #2d5ae3, #ffcc00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto 15px;
      font-weight: bold;
    }
    
    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #ffcc00;
    }
    
    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    
    .message {
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }
    
    .message.error {
      background: rgba(255,0,0,0.2);
      color: #ff6666;
    }
    
    .message.success {
      background: rgba(0,255,0,0.2);
      color: #66ff66;
    }
    
    .settings-btn {
      background: rgba(45, 90, 227, 0.3);
      border: 1px solid rgba(45, 90, 227, 0.5);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      width: 100%;
    }
    
    .settings-btn:hover {
      background: rgba(45, 90, 227, 0.5);
      transform: translateY(-2px);
    }
    
    .logout-btn {
      background: rgba(220, 50, 50, 0.2);
      border-color: rgba(220, 50, 50, 0.5);
    }
    
    .logout-btn:hover {
      background: rgba(220, 50, 50, 0.4);
    }
    
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 20px 0;
    }
    
    .sync-status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      margin-left: 10px;
    }
    
    .sync-status.online {
      background: rgba(0, 255, 0, 0.2);
      color: #00ff88;
    }
    
    .sync-status.offline {
      background: rgba(255, 165, 0, 0.2);
      color: #ffa500;
    }
    
    .guest-message {
      text-align: center;
      padding: 40px;
    }
    
    /* Leaderboard */
    .leaderboard-filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .filter-btn.active {
      background: rgba(255,204,0,0.2);
      border-color: #ffcc00;
      color: #ffcc00;
    }
    
    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .leaderboard-item:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(5px);
    }
    
    .leaderboard-item.current-user {
      background: rgba(255,204,0,0.1);
      border-color: #ffcc00;
    }
    
    .rank {
      font-size: 20px;
      font-weight: bold;
      min-width: 40px;
      color: rgba(255,255,255,0.5);
    }
    
    .rank.top-1 { color: #ffcc00; }
    .rank.top-2 { color: #c0c0c0; }
    .rank.top-3 { color: #cd7f32; }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #2d5ae3, #ffcc00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
    }
    
    .user-info {
      flex: 1;
    }
    
    .user-name {
      font-size: 16px;
      font-weight: bold;
    }
    
    .user-username {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    
    .user-score {
      font-size: 20px;
      font-weight: bold;
      color: #ffcc00;
      margin-right: 10px;
    }
    
    .user-coins {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #ffcc00;
      font-size: 14px;
    }
    
    .profile-games-section {
      margin-top: 25px;
      text-align: left;
    }
    
    .profile-games-section h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
    }
    
    .profile-game-tag {
      display: inline-block;
      background: rgba(45, 90, 227, 0.3);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin: 3px;
    }
    
    .profile-game-tag.favorite {
      background: rgba(255, 204, 0, 0.2);
      color: #ffcc00;
    }
    
    /* Achievements */
    .achievements-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .total-score {
      background: linear-gradient(135deg, rgba(255,204,0,0.2), rgba(255,204,0,0.05));

      padding: 8px 20px;
      text-align: center;
    }
    
    .total-score .score-number {
      font-size: 28px;
      font-weight: bold;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
    }
    
    .total-score .score-label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-left: 8px;
    }
    
    .total-progress {
      flex: 1;
      min-width: 200px;
    }
    
    .total-progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 5px;
    }
    
    .total-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffcc00, #ffaa00);
      width: 0%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    
    .total-progress-text {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

      border-radius: 16px;
      margin-bottom: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .category-header {

      background: rgba(0,0,0,0.2);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;

      background: rgba(0,0,0,0.3);
    }
    
    .category-title {

      align-items: center;
      gap: 10px;
    }
    
    .category-icon {
      font-size: 24px;
    }
    
    .category-name {
      font-size: 16px;
      font-weight: bold;

    .category-stats {

      color: #ffcc00;
    }

      font-size: 11px;
      color: rgba(255,255,255,0.5);

      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }
    
    .category-progress-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }
    
    .category-newbie .category-progress-fill { background: #00ff88; }
    .category-beginner .category-progress-fill { background: #2d5ae3; }
    .category-climbing .category-progress-fill { background: #ff8800; }
    .category-difficult .category-progress-fill { background: #ff4444; }
    .category-elite .category-progress-fill { background: #ffcc00; }
    .category-secret .category-progress-fill { background: linear-gradient(90deg, #ff00ff, #00ffff); }
    
    .achievements-list {
      padding: 15px 20px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    
    .category-card.open .achievements-list {
      display: flex;
    }
    
    .achievement-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      transition: all 0.2s ease;
    }
    
    .achievement-item.unlocked {
      background: linear-gradient(135deg, rgba(255,204,0,0.1), rgba(255,204,0,0.02));
      border-left: 3px solid #ffcc00;
    }
    
    .achievement-item.locked {
      opacity: 0.7;
    }
    
    .achievement-icon {
      font-size: 32px;
      min-width: 50px;
      text-align: center;
    }
    
    .achievement-info {
      flex: 1;
    }
    
    .achievement-name {
      font-size: 14px;
      font-weight: bold;
      color: white;
    }
    
    .achievement-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }
    
    .achievement-points {
      font-size: 12px;
      color: #ffcc00;
      min-width: 50px;
      text-align: right;
    }
    
    .achievement-item.secret-hidden .achievement-icon {
      filter: blur(4px);
    }
    
    .achievement-item.secret-hidden .achievement-name,
    .achievement-item.secret-hidden .achievement-desc {
      filter: blur(3px);
      user-select: none;

      <button class="account-tab active" data-tab="profile">my profile</button>
      <button class="account-tab" data-tab="achievements">🏆 achievements</button>
      <button class="account-tab" data-tab="leaderboard">🏅 leaderboard</button>
      <button class="account-tab" data-tab="login">login</button>
      <button class="account-tab" data-tab="register">register</button>
    </div>

    <!-- Profile Tab -->
    <div id="profileTab" class="account-tab-content active">
      <div id="profileContent">
        <div class="guest-message">loading profile...</div>
      </div>
    </div>

    <!-- Achievements Tab -->
    <div id="achievementsTab" class="account-tab-content">
      <div id="achievementsContent">
        <div class="guest-message">loading achievements...</div>
      </div>
    </div>

    <!-- Leaderboard Tab -->
    <div id="leaderboardTab" class="account-tab-content">
      <div id="leaderboardContent">
        <div class="leaderboard-filters">
          <button class="filter-btn active" data-filter="coins">💰 Coins</button>
          <button class="filter-btn" data-filter="games_played">🎮 Games Played</button>
          <button class="filter-btn" data-filter="achievements">🏆 Achievements</button>
        </div>
        <div id="leaderboardList" class="leaderboard-list">
          <div class="guest-message">loading leaderboard...</div>
        </div>
      </div>
    </div>

    <!-- Login Tab -->
    <div id="loginTab" class="account-tab-content">
      <form id="loginForm" class="account-form">
        <input type="email" id="loginEmail" placeholder="email" required>
        <input type="password" id="loginPassword" placeholder="password" required>
        <button type="submit" class="settings-btn">login with supabase</button>
        <div id="loginMessage" class="message"></div>
      </form>
      <div style="text-align: center; margin-top: 20px;">
        <p style="opacity: 0.7; font-size: 14px;">or</p>
        <button onclick="continueWithLocalStorage()" class="settings-btn" style="margin-top: 10px;">continue with local save</button>
      </div>
    </div>

    <!-- Register Tab -->
    <div id="registerTab" class="account-tab-content">
      <form id="registerForm" class="account-form">
        <input type="text" id="regUsername" placeholder="username" required>
        <input type="email" id="regEmail" placeholder="email" required>
        <input type="text" id="regDisplayName" placeholder="display name (optional)">
        <input type="password" id="regPassword" placeholder="password" required>
        <input type="password" id="regConfirmPassword" placeholder="confirm password" required>
        <button type="submit" class="settings-btn">register with supabase</button>
        <div id="registerMessage" class="message"></div>
      </form>
    </div>
  </div>

    };
    
    // ===== STATE =====
    let currentUser = null;
    let localUser = null;
    let syncStatus = 'offline';
    let currentFilter = 'coins';
    let userAchievements = {};
    
    // ===== INIT =====
    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      
      if (session) {
        currentUser = session.user;
        syncStatus = 'online';
        await loadSupabaseData();
      } else {
        loadLocalData();
      }
      
      setupTabs();
      setupLeaderboardFilters();
      updateUI();
      renderCurrentTab();
    }
    
    function loadLocalData() {
      localUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
      userAchievements = JSON.parse(localStorage.getItem('fanter_achievements') || '{}');
      syncStatus = 'offline';
    }
    
    async function loadSupabaseData() {
      try {
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
        if (profile) {
          localUser = {
            id: profile.id,
            username: profile.username,
            displayName: profile.display_name,
            email: profile.email,
            coins: profile.coins || 300,
            stats: {},
            favorites: [],
            playedGames: []
          };
        }
        
        const { data: achievements } = await supabase.from('user_achievements').select('achievement_id').eq('user_id', currentUser.id);
        userAchievements = {};
        achievements?.forEach(a => { userAchievements[a.achievement_id] = true; });
        
      } catch (error) {
        console.error('Error loading Supabase data:', error);
      }
    }
    
    // ===== AUTH =====
    async function handleLogin(email, password) {
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        
        currentUser = data.user;
        syncStatus = 'online';
        await loadSupabaseData();
        
        showMessage('loginMessage', 'Login successful!', 'success');
        setTimeout(() => window.location.reload(), 1000);
      } catch (error) {
        showMessage('loginMessage', error.message, 'error');
      }
    }
    
    async function handleRegister(username, email, displayName, password) {
      try {
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: { data: { username, display_name: displayName || username } }
        });
        
        if (error) throw error;
        
        if (data.user) {
          await supabase.from('profiles').insert({
            id: data.user.id,
            username,
            display_name: displayName || username,
            email,
            coins: 300
          });
        }
        
        showMessage('registerMessage', 'Account created! Check your email.', 'success');
      } catch (error) {
        showMessage('registerMessage', error.message, 'error');
      }
    }
    
    async function handleLogout() {
      await supabase.auth.signOut();
      currentUser = null;
      syncStatus = 'offline';
      loadLocalData();
      updateUI();
      switchTab('profile');
    }
    
    function continueWithLocalStorage() {
      loadLocalData();
      updateUI();
      switchTab('profile');
    }
    
    // ===== RENDERING =====
    function renderProfile() {
      const container = document.getElementById('profileContent');
      const user = localUser;
      
      if (!user) {
        container.innerHTML = `
          <div class="guest-message">
            <p>You're browsing as a guest</p>
            <button onclick="switchTab('register')" class="settings-btn" style="width:auto; padding:10px 30px;">create account</button>
          </div>
        `;
        return;
      }
      
      const displayName = user.displayName || user.username || 'User';
      const username = user.username || displayName.toLowerCase();
      const coins = user.coins || 300;
      const stats = user.stats || { gamesPlayed: 0, ratingsGiven: 0, favoritesCount: 0 };
      const favorites = user.favorites || [];
      const playedGames = user.playedGames || [];
      const unlockedCount = Object.keys(userAchievements).length;
      
      const statusDot = syncStatus === 'online' ? '🟢' : '🟠';
      const statusText = syncStatus === 'online' ? 'Supabase' : 'Local';
      
      container.innerHTML = `
        <div class="profile-info">
          <div class="profile-avatar">${displayName[0].toUpperCase()}</div>
          <h2>${displayName} <span class="sync-status ${syncStatus}">${statusDot} ${statusText}</span></h2>
          <p style="opacity:0.7;">@${username}</p>
          <div><span class="user-coins">💰 ${Math.floor(coins * 100) / 100} coins</span></div>
        </div>
        
        <div class="profile-stats">
          <div class="stat"><div class="stat-number">${stats.gamesPlayed || 0}</div><div class="stat-label">Games</div></div>
          <div class="stat"><div class="stat-number">${stats.ratingsGiven || 0}</div><div class="stat-label">Ratings</div></div>
          <div class="stat"><div class="stat-number">${favorites.length}</div><div class="stat-label">Favorites</div></div>
          <div class="stat"><div class="stat-number">${unlockedCount}</div><div class="stat-label">Achievements</div></div>
        </div>
        
        ${playedGames.length > 0 ? `
          <div class="profile-games-section">
            <h3>🎮 Recently Played</h3>
            <div>${playedGames.slice(0,6).map(g => `<span class="profile-game-tag">${g}</span>`).join('')}</div>
          </div>
        ` : ''}
        
        ${favorites.length > 0 ? `
          <div class="profile-games-section">
            <h3>⭐ Favorites</h3>
            <div>${favorites.slice(0,8).map(g => `<span class="profile-game-tag favorite">${g}</span>`).join('')}</div>
          </div>
        ` : ''}
        
        <div class="divider"></div>
        
        <div style="display:flex; gap:10px;">
          <button class="settings-btn" onclick="switchTab('achievements')">view achievements</button>
          <button class="settings-btn logout-btn" onclick="handleLogout()">${currentUser ? 'Logout' : 'Clear'}</button>
        </div>
      `;
    }
    
    function renderAchievements() {
      const container = document.getElementById('achievementsContent');
      
      if (!localUser) {
        container.innerHTML = '<div class="guest-message">Please log in to view achievements</div>';
        return;
      }
      
      let totalPoints = 0;
      let totalAchievements = 0;
      let maxPoints = 0;
      
      for (const cat of Object.values(ACHIEVEMENTS_DATA)) {
        const progress = getCategoryProgress(cat);
        totalPoints += progress.points;
        totalAchievements += progress.earned;
        maxPoints += cat.achievements.length * cat.pointsPer;
      }
      
      const totalPercent = maxPoints > 0 ? (totalPoints / maxPoints) * 100 : 0;
      
      let html = `
        <div class="achievements-header">
          <div class="total-score">
            <span class="score-number">${totalPoints.toFixed(1)}</span>
            <span class="score-label">points</span>
          </div>
          <div class="total-progress">
            <div class="total-progress-bar"><div class="total-progress-fill" style="width:${totalPercent}%;"></div></div>
            <div class="total-progress-text">${totalAchievements}/63 completed</div>
          </div>
        </div>
      `;
      
      for (const [catKey, catData] of Object.entries(ACHIEVEMENTS_DATA)) {
        const progress = getCategoryProgress(catData);
        const isOpen = localStorage.getItem(`category_${catKey}_open`) === 'true';
        
        html += `
          <div class="category-card category-${catKey} ${isOpen ? 'open' : ''}">
            <div class="category-header" onclick="toggleCategory('${catKey}')">
              <div class="category-title">
                <span class="category-icon">${catData.icon}</span>
                <span class="category-name" style="color:${catData.color}">${catData.name}</span>
              </div>
              <div class="category-stats">
                <div class="category-points">${progress.points.toFixed(1)} / ${(catData.achievements.length * catData.pointsPer).toFixed(1)}</div>
                <div class="category-progress">${progress.earned}/${progress.total}</div>
                <div class="category-progress-bar"><div class="category-progress-fill" style="width:${progress.percent}%;"></div></div>
              </div>
            </div>
            <div class="achievements-list">
        `;
        
        for (const ach of catData.achievements) {
          const isUnlocked = userAchievements[ach.id] === true;
          const isHidden = ach.hidden && !isUnlocked;
          
          html += `
            <div class="achievement-item ${isUnlocked ? 'unlocked' : 'locked'} ${isHidden ? 'secret-hidden' : ''}">
              <div class="achievement-icon">${isHidden ? '❓' : ach.icon}</div>
              <div class="achievement-info">
                <div class="achievement-name">${isHidden ? '???' : ach.name}</div>
                <div class="achievement-desc">${isHidden ? (ach.hint || 'secret achievement') : (isUnlocked ? ach.desc : (ach.hint || ach.desc))}</div>
              </div>
              <div class="achievement-points">+${catData.pointsPer.toFixed(1)}</div>
            </div>
          `;
        }
        
        html += `</div></div>`;
      }
      
      container.innerHTML = html;
    }
    
    function getCategoryProgress(catData) {
      let earned = 0, points = 0;
      catData.achievements.forEach(ach => {
        if (userAchievements[ach.id]) { earned++; points += catData.pointsPer; }
      });
      return { earned, total: catData.achievements.length, points, percent: (earned / catData.achievements.length) * 100 };
    }
    
    function renderLeaderboard() {
      const container = document.getElementById('leaderboardList');
      container.innerHTML = '<div class="guest-message">loading...</div>';
      
      const users = JSON.parse(localStorage.getItem('fanter_users') || '[]');
      
      // Add achievement points to each user
      users.forEach(u => {
        const ach = JSON.parse(localStorage.getItem(`fanter_achievements_${u.id}`) || '{}');
        let points = 0;
        for (const [catKey, cat] of Object.entries(ACHIEVEMENTS_DATA)) {
          cat.achievements.forEach(a => { if (ach[a.id]) points += cat.pointsPer; });
        }
        u.achievementPoints = points;
      });
      
      users.sort((a, b) => {
        if (currentFilter === 'coins') return (b.coins || 0) - (a.coins || 0);
        if (currentFilter === 'games_played') return ((b.stats?.gamesPlayed || 0) - (a.stats?.gamesPlayed || 0));
        return (b.achievementPoints || 0) - (a.achievementPoints || 0);
      });
      
      let html = '';
      users.slice(0, 50).forEach((u, i) => {
        const rank = i + 1;
        const rankClass = rank <= 3 ? `top-${rank}` : '';
        const isCurrent = localUser && u.id === localUser.id;
        const displayName = u.displayName || u.username || 'User';
        
        let score;
        if (currentFilter === 'coins') score = `💰 ${Math.floor((u.coins || 0) * 100) / 100}`;
        else if (currentFilter === 'games_played') score = `🎮 ${u.stats?.gamesPlayed || 0}`;
        else score = `🏆 ${(u.achievementPoints || 0).toFixed(1)}`;
        
        html += `
          <div class="leaderboard-item ${isCurrent ? 'current-user' : ''}">
            <div class="rank ${rankClass}">#${rank}</div>
            <div class="user-avatar">${displayName[0].toUpperCase()}</div>
            <div class="user-info">
              <div class="user-name">${displayName}</div>
              <div class="user-username">@${u.username}</div>
            </div>
            <div class="user-score">${score}</div>
          </div>
        `;
      });
      
      container.innerHTML = html || '<div class="guest-message">no users</div>';
    }
    
    // ===== UI HELPERS =====
    function setupTabs() {
      document.querySelectorAll('.account-tab').forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.getAttribute('data-tab')));
      });
      
      document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        await handleLogin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
      });
      
      document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw = document.getElementById('regPassword').value;
        if (pw !== document.getElementById('regConfirmPassword').value) {
          showMessage('registerMessage', 'Passwords do not match', 'error');
          return;
        }
        await handleRegister(
          document.getElementById('regUsername').value,
          document.getElementById('regEmail').value,
          document.getElementById('regDisplayName').value,
          pw
        );
      });
    }
    
    function setupLeaderboardFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.getAttribute('data-filter');
          renderLeaderboard();
        });
      });
    }
    
    function switchTab(tabName) {
      document.querySelectorAll('.account-tab').forEach(t => t.classList.toggle('active', t.getAttribute('data-tab') === tabName));
      document.querySelectorAll('.account-tab-content').forEach(c => c.classList.toggle('active', c.id === `${tabName}Tab`));
      renderCurrentTab();
    }
    
    function renderCurrentTab() {
      const active = document.querySelector('.account-tab-content.active');
      if (!active) return;
      if (active.id === 'profileTab') renderProfile();
      else if (active.id === 'achievementsTab') renderAchievements();
      else if (active.id === 'leaderboardTab') renderLeaderboard();
    }
    
    function updateUI() {
      const nameEl = document.getElementById('accountName');
      const tabs = document.querySelectorAll('.account-tab');
      const user = localUser;
      
      if (user) {
        nameEl.textContent = user.displayName || user.username || 'User';
        tabs.forEach(t => { if (t.getAttribute('data-tab') === 'login' || t.getAttribute('data-tab') === 'register') t.style.display = 'none'; });
      } else {
        nameEl.textContent = 'Guest';
        tabs.forEach(t => t.style.display = 'block');
      }
    }
    
    function toggleCategory(cat) {
      const card = document.querySelector(`.category-card[data-category="${cat}"]`) || 
                   document.querySelector(`.category-${cat}`);
      if (card) {
        card.classList.toggle('open');
        localStorage.setItem(`category_${cat}_open`, card.classList.contains('open'));
      }
    }
    
    function showMessage(elId, msg, type) {
      const el = document.getElementById(elId);
      if (el) { el.textContent = msg; el.className = `message ${type}`; }
    }
    
    window.switchTab = switchTab;
    window.handleLogout = handleLogout;
    window.continueWithLocalStorage = continueWithLocalStorage;
    window.toggleCategory = toggleCategory;
    
    init();
  </script>
