<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>fanter | playing</title>
  <link rel="stylesheet" href="config/main.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a1a, #0f0f2a);
      font-family: 'Ubuntu', sans-serif;
    }
    .game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .game-header {
      background: rgba(10,15,30,0.9);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(45,90,227,0.3);
    }
    .game-name { color: #ffcc00; font-family: 'Orbitron', monospace; font-size: 18px; }
    .game-controls { display: flex; gap: 10px; }
    .game-control-btn {
      background: rgba(20,30,50,0.8);
      border: 1px solid rgba(45,90,227,0.4);
      border-radius: 20px;
      padding: 5px 12px;
      color: white;
      cursor: pointer;
    }
    .game-wrapper { flex: 1; background: #000; }
    .game-frame { width: 100%; height: 100%; border: none; }
    .sidebar {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: rgba(0,0,0,0.7);
      padding: 10px 15px;
      border-radius: 30px;
      color: white;
      font-size: 12px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <span class="game-name" id="gameTitle">Loading...</span>
      <div class="game-controls">
        <button class="game-control-btn" onclick="window.location.href='index.html'">← back</button>
      </div>
    </div>
    <div class="game-wrapper">
      <iframe class="game-frame" id="gameFrame" src="about:blank" allowfullscreen></iframe>
    </div>
  </div>
  <div class="sidebar" id="sidebar">
    🪙 <span id="coinAmount">0</span> coins | ⏱️ <span id="playtimeDisplay">00:00:00</span>
  </div>

  <script>
    // Get game info from URL
    const urlParams = new URLSearchParams(window.location.search);
    let gameUrl = urlParams.get("gameurl");
    let gameName = urlParams.get("game") || "Game";
    const decodedGameName = decodeURIComponent(gameName);
    
    console.log("🔍 Game URL:", gameUrl);
    console.log("📝 Game name:", decodedGameName);
    
    document.getElementById('gameTitle').textContent = decodedGameName;
    
    if (!gameUrl || gameUrl === 'undefined' || gameUrl === 'null') {
      document.getElementById('gameFrame').outerHTML = '<div style="padding:40px;text-align:center;color:#ff4444;">❌ Game URL not found</div>';
    } else {
      // Load the game in iframe
      const gameFrame = document.getElementById('gameFrame');
      gameFrame.src = gameUrl;
      console.log("✅ Loading game from:", gameUrl);
    }
    
    // Simple coin timer
    let startTime = Date.now();
    let coins = 0;
    
    setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const hours = Math.floor(elapsed / 3600);
      const minutes = Math.floor((elapsed % 3600) / 60);
      const seconds = elapsed % 60;
      document.getElementById('playtimeDisplay').textContent = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
      
      coins = elapsed * 0.01;
      document.getElementById('coinAmount').textContent = coins.toFixed(2);
    }, 1000);
  </script>
</body>
</html>
