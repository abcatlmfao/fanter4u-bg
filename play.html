<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fanter | playing</title>
  <link rel="stylesheet" href="config/main.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a1a, #0f0f2a, #1a0a2a);
      background-size: 400% 400%;
      animation: bgShift 15s ease infinite;
      font-family: 'Ubuntu', sans-serif;
      overflow: hidden;
    }

    @keyframes bgShift {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    /* Main Layout */
    .game-layout {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    /* Side Menu */
    .game-sidebar {
      width: 280px;
      background: rgba(10, 15, 30, 0.9);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(45, 90, 227, 0.3);
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease;
      z-index: 100;
      position: relative;
    }

    .game-sidebar.collapsed {
      width: 70px;
    }

    .sidebar-toggle {
      position: absolute;
      right: -12px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(45, 90, 227, 0.9);
      border: 1px solid rgba(255, 204, 0, 0.3);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      z-index: 101;
      transition: all 0.2s ease;
      color: white;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-toggle:hover {
      background: #ffcc00;
      color: #1a1a2e;
      transform: translateY(-50%) scale(1.1);
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }

    .game-sidebar.collapsed .sidebar-header {
      padding: 20px 10px;
    }

    .sidebar-header h2 {
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      transition: all 0.2s ease;
    }

    .game-sidebar.collapsed .sidebar-header h2 {
      font-size: 0;
    }

    .game-sidebar.collapsed .sidebar-header h2::before {
      content: "🎮";
      font-size: 24px;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      transition: opacity 0.2s ease;
      padding-bottom: 20px;
    }

    .game-sidebar.collapsed .sidebar-content {
      opacity: 0;
      visibility: hidden;
    }

    /* Sidebar Cards */
    .sidebar-card {
      background: rgba(20, 30, 50, 0.6);
      border: 1px solid rgba(45, 90, 227, 0.3);
      border-radius: 16px;
      margin: 15px;
      padding: 15px;
      transition: all 0.2s ease;
    }

    .sidebar-card:hover {
      border-color: rgba(255, 204, 0, 0.3);
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 24px;
      margin-bottom: 10px;
      text-align: center;
    }

    .card-title {
      font-size: 12px;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
      margin-bottom: 10px;
      text-align: center;
    }

    .coin-amount {
      font-size: 28px;
      font-weight: bold;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
      text-align: center;
    }

    .coin-label {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      text-align: center;
    }

    .playtime-value {
      font-size: 20px;
      font-weight: bold;
      color: #2d5ae3;
      font-family: 'Orbitron', monospace;
      text-align: center;
    }

    .game-name-display {
      text-align: center;
      font-size: 14px;
      word-break: break-word;
      color: white;
    }

    .sidebar-btn {
      width: 100%;
      background: rgba(45, 90, 227, 0.2);
      border: 1px solid rgba(45, 90, 227, 0.3);
      border-radius: 30px;
      padding: 10px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 10px;
    }

    .sidebar-btn:hover {
      background: rgba(45, 90, 227, 0.4);
      border-color: #ffcc00;
      transform: translateY(-2px);
    }

    /* Main Game Area */
    .game-main {
      flex: 1;
      margin-left: 280px;
      padding: 40px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: margin-left 0.3s ease;
    }

    .game-sidebar.collapsed ~ .game-main {
      margin-left: 70px;
    }

    /* Game Container - Smaller, centered */
    .game-container {
      width: 100%;
      max-width: 1000px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 24px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(45, 90, 227, 0.3);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .game-container.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 100%;
      border-radius: 0;
      z-index: 1000;
    }

    .game-header {
      background: rgba(10, 15, 30, 0.8);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(45, 90, 227, 0.3);
      flex-wrap: wrap;
      gap: 10px;
    }

    .game-name {
      font-size: 16px;
      font-weight: bold;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
    }

    .game-controls {
      display: flex;
      gap: 10px;
    }

    .game-control-btn {
      background: rgba(20, 30, 50, 0.8);
      border: 1px solid rgba(45, 90, 227, 0.4);
      border-radius: 20px;
      padding: 5px 12px;
      color: white;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .game-control-btn:hover {
      border-color: #ffcc00;
      transform: translateY(-2px);
    }

    .game-wrapper {
      aspect-ratio: 16 / 9;
      width: 100%;
      background: #000;
    }

    .game-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Loading Screen */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(45, 90, 227, 0.3);
      border-top: 3px solid #2d5ae3;
      border-right: 3px solid #ffcc00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #00ff88;
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      letter-spacing: 2px;
    }

    /* Scrollbar */
    .sidebar-content::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-content::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }

    .sidebar-content::-webkit-scrollbar-thumb {
      background: #2d5ae3;
      border-radius: 4px;
    }

    @media (max-width: 768px) {
      .game-sidebar {
        width: 240px;
      }
      .game-main {
        margin-left: 240px;
        padding: 20px;
      }
      .game-sidebar.collapsed {
        width: 50px;
      }
      .game-sidebar.collapsed ~ .game-main {
        margin-left: 50px;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">LOADING GAME...</div>
  </div>

  <div class="game-layout">
    <!-- Side Menu -->
    <div class="game-sidebar" id="gameSidebar">
      <div class="sidebar-toggle" id="sidebarToggle">◀</div>
      
      <div class="sidebar-header">
        <h2>fanter</h2>
      </div>
      
      <div class="sidebar-content">
        <div class="sidebar-card">
          <div class="card-icon">🎮</div>
          <div class="card-title">now playing</div>
          <div class="game-name-display" id="gameNameDisplay">Loading...</div>
        </div>
        
        <div class="sidebar-card">
          <div class="card-icon">🪙</div>
          <div class="card-title">your coins</div>
          <div class="coin-amount" id="coinAmount">0</div>
          <div class="coin-label">earned this session</div>
          <div class="coin-label" style="font-size: 9px;">+0.01 per second</div>
        </div>
        
        <div class="sidebar-card">
          <div class="card-icon">⏱️</div>
          <div class="card-title">session time</div>
          <div class="playtime-value" id="playtimeDisplay">00:00:00</div>
        </div>
        
        <div class="sidebar-card">
          <div class="card-icon">🛒</div>
          <div class="card-title">shop</div>
          <button class="sidebar-btn" id="shopBtn" onclick="alert('🪙 Shop coming soon! Use your coins to buy themes, cursors, and pets!')">visit shop →</button>
        </div>
        
        <div class="sidebar-card">
          <div class="card-icon">🔗</div>
          <div class="card-title">links</div>
          <button class="sidebar-btn" onclick="window.location.href='index.html'">← back to games</button>
          <button class="sidebar-btn" onclick="window.location.href='fantaccount.html'">👤 my account</button>
        </div>
      </div>
    </div>
    
    <!-- Main Game Area -->
    <div class="game-main">
      <div class="game-container" id="gameContainer">
        <div class="game-header">
          <span class="game-name" id="gameTitle">Loading...</span>
          <div class="game-controls">
            <button class="game-control-btn" id="fullscreenBtn">🖥️ fullscreen</button>
            <button class="game-control-btn" id="refreshBtn">🔄 refresh</button>
            <button class="game-control-btn" onclick="window.location.href='index.html'">← back</button>
          </div>
        </div>
        <div class="game-wrapper">
          <iframe class="game-frame" id="gameFrame" src="about:blank" allowfullscreen></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Get game info from URL
    const urlParams = new URLSearchParams(window.location.search);
    let gameUrl = urlParams.get("gameurl");
    let gameName = urlParams.get("game") || "Game";
    const decodedGameName = decodeURIComponent(gameName);
    
    console.log("🔍 Game URL:", gameUrl);
    console.log("📝 Game name:", decodedGameName);
    
    // Update UI
    document.getElementById('gameTitle').textContent = decodedGameName;
    document.getElementById('gameNameDisplay').textContent = decodedGameName;
    
    if (!gameUrl || gameUrl === 'undefined' || gameUrl === 'null') {
      document.getElementById('gameContainer').innerHTML = `
        <div class="game-header">
          <span class="game-name">Error</span>
          <button class="game-control-btn" onclick="window.location.href='index.html'">← back</button>
        </div>
        <div style="text-align: center; padding: 60px 20px;">
          <div style="font-size: 64px; margin-bottom: 20px;">😵</div>
          <div style="font-size: 24px; color: #ff4444; margin-bottom: 10px;">Game URL Not Found</div>
          <div style="color: rgba(255,255,255,0.7);">Please go back and try again.</div>
        </div>
      `;
      document.getElementById('loadingOverlay').classList.add('hide');
    } else {
      // Load the game in iframe
      const gameFrame = document.getElementById('gameFrame');
      const loadingOverlay = document.getElementById('loadingOverlay');
      
      gameFrame.src = gameUrl;
      console.log("✅ Loading iframe with src:", gameUrl);
      
      // Hide loading screen after a short delay
      setTimeout(() => {
        loadingOverlay.classList.add('hide');
      }, 1500);
      
      // Fullscreen toggle
      let isFullscreen = false;
      const fullscreenBtn = document.getElementById('fullscreenBtn');
      const gameContainer = document.getElementById('gameContainer');
      
      fullscreenBtn.onclick = () => {
        if (!isFullscreen) {
          gameContainer.classList.add('fullscreen');
          fullscreenBtn.innerHTML = '⬛ exit';
          isFullscreen = true;
        } else {
          gameContainer.classList.remove('fullscreen');
          fullscreenBtn.innerHTML = '🖥️ fullscreen';
          isFullscreen = false;
        }
      };
      
      // Escape key to exit fullscreen
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && isFullscreen) {
          gameContainer.classList.remove('fullscreen');
          fullscreenBtn.innerHTML = '🖥️ fullscreen';
          isFullscreen = false;
        }
      });
      
      // Refresh button
      document.getElementById('refreshBtn').onclick = () => {
        loadingOverlay.classList.remove('hide');
        gameFrame.src = gameUrl;
        setTimeout(() => {
          loadingOverlay.classList.add('hide');
        }, 1500);
      };
      
      // Track game play for achievements
      if (typeof window.trackPlayedGame === 'function') window.trackPlayedGame(decodedGameName);
      if (typeof window.trackGamePlayCount === 'function') window.trackGamePlayCount(decodedGameName);
      
      // Coin system
      let sessionStartTime = Date.now();
      let totalCoinsEarned = 0;
      let coinInterval = null;
      let currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
      
      function loadUserCoins() {
        if (currentUser && currentUser.coins !== undefined) totalCoinsEarned = currentUser.coins;
        document.getElementById('coinAmount').textContent = Math.floor(totalCoinsEarned * 100) / 100;
      }
      
      function saveUserCoins() {
        if (!currentUser) return;
        currentUser.coins = totalCoinsEarned;
        localStorage.setItem('fanter_currentUser', JSON.stringify(currentUser));
        let users = JSON.parse(localStorage.getItem('fanter_users') || '[]');
        const userIndex = users.findIndex(u => u.id === currentUser.id);
        if (userIndex !== -1) {
          users[userIndex].coins = totalCoinsEarned;
          localStorage.setItem('fanter_users', JSON.stringify(users));
        }
      }
      
      function updateCoinDisplay() {
        document.getElementById('coinAmount').textContent = Math.floor(totalCoinsEarned * 100) / 100;
      }
      
      function updatePlaytimeDisplay() {
        const elapsedSeconds = Math.floor((Date.now() - sessionStartTime) / 1000);
        const hours = Math.floor(elapsedSeconds / 3600);
        const minutes = Math.floor((elapsedSeconds % 3600) / 60);
        const seconds = elapsedSeconds % 60;
        document.getElementById('playtimeDisplay').textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }
      
      function startCoinEarning() {
        if (coinInterval) clearInterval(coinInterval);
        coinInterval = setInterval(() => {
          if (!document.hidden) {
            totalCoinsEarned += 0.01;
            updateCoinDisplay();
            saveUserCoins();
          }
        }, 1000);
      }
      
      setInterval(updatePlaytimeDisplay, 1000);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          if (coinInterval) clearInterval(coinInterval);
          coinInterval = null;
        } else {
          if (!coinInterval) startCoinEarning();
        }
      });
      
      loadUserCoins();
      startCoinEarning();
      window.addEventListener('beforeunload', () => saveUserCoins());
      
      // Sidebar collapse
      let sidebarCollapsed = localStorage.getItem('sidebarCollapsed_play') === 'true';
      const sidebar = document.getElementById('gameSidebar');
      const toggleBtn = document.getElementById('sidebarToggle');
      
      function toggleSidebar() {
        sidebarCollapsed = !sidebarCollapsed;
        localStorage.setItem('sidebarCollapsed_play', sidebarCollapsed);
        if (sidebarCollapsed) {
          sidebar.classList.add('collapsed');
          toggleBtn.innerHTML = '▶';
        } else {
          sidebar.classList.remove('collapsed');
          toggleBtn.innerHTML = '◀';
        }
      }
      toggleBtn.onclick = toggleSidebar;
      if (sidebarCollapsed) {
        sidebar.classList.add('collapsed');
        toggleBtn.innerHTML = '▶';
      }
    }
  </script>
</body>
</html>
