<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fanter v0.3</title>
  <link rel="stylesheet" href="config/main.css" />
</head>

<body>
  <!-- Loading Screen -->
  <div id="loadingScreen">
    <canvas id="matrixCanvas"></canvas>
    <div class="matrix-scanlines"></div>
    <div id="brokenWallContainer"></div>
    <div class="loading-content">
      <div class="loading-icon"></div>
      <h1 class="loading-title">Loading fanter.OS</h1>
      <div class="loading-progress">
        <div class="loading-progress-bar"></div>
      </div>
      <p class="loading-status" id="loadingStatus">Initializing systems...</p>
    </div>
  </div>

  <div id="whiteFlash"></div>
  <div id="revealOverlay"></div>

  <!-- Main Content - HIDDEN initially -->
  <div id="mainContent" style="opacity: 0; visibility: hidden;">
    <!-- Account Button -->
    <div class="account-btn-container">
      <button class="account-btn" id="accountBtn" onclick="window.location.href='fantaccount.html'">
        <span class="account-icon">👤</span>
        <span class="account-name" id="accountName">Guest</span>
      </button>
    </div>

    <button class="fav-sidebar-btn" id="favSidebarBtn" onclick="window.toggleFavSidebar()">★</button>
    
    <div class="center">
      <h1 id="title"></h1>
      <p id="subtitle"></p>
      <button class="settings-btn" onclick="window.location.href='settings.html'">⚙ Settings</button>
    </div>
    
    <div class="center">
      <input type="text" id="searchInput" placeholder="search 4 games" />
    </div>
    
    <div id="gamesContainer"></div>
    
    <div class="footer">
      <a style="font-weight: 700">a site created by abcatlmfao, / chipikipal800, / abcatlmfao69;</a>
      <a style="font-weight: 700" class="link" href="https://dsc.gg/parcoil">parcoil network</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="config/theme-loader.js"></script>
  <script src="config/main.js"></script>
  <script src="config/quicklaunch.js"></script>
  <script src="config/categories.js"></script>
  <script src="config/gamedetails.js"></script>

  <!-- Safety Key Script -->
  <script>
    let lastKeyTime = 0;
    let lastKey = "";
    document.addEventListener("keydown", (e) => {
      const safetyKey = localStorage.getItem("safetyKey");
      const safetyUrl = localStorage.getItem("safetyUrl");
      if (!safetyKey || !safetyUrl) return;
      const now = Date.now();
      const pressedKey = e.key.toLowerCase();
      const storedKey = safetyKey.toLowerCase();
      if (pressedKey === storedKey && pressedKey === lastKey && now - lastKeyTime < 1000) {
        e.preventDefault();
        window.location.href = safetyUrl;
      }
      lastKey = pressedKey;
      lastKeyTime = now;
    });
  </script>

  <!-- Loading Screen Script -->
  <script>
    // ===== LOADING SCREEN SYSTEM (WITH VISIT CHECK) =====
    (function() {
      // Check if this is the first visit or a return from settings
      const hasLoadedBefore = sessionStorage.getItem('fanterLoaded');
      
      // If coming back from settings, skip loading screen
      if (hasLoadedBefore === 'true') {
        const mainContent = document.getElementById('mainContent');
        const loadingScreen = document.getElementById('loadingScreen');
        
        if (loadingScreen) loadingScreen.style.display = 'none';
        if (mainContent) {
          mainContent.style.opacity = '1';
          mainContent.style.visibility = 'visible';
        }
        
        // Still animate games and UI for fresh feel
        setTimeout(() => {
          if (typeof animateGamesRandomly === 'function') animateGamesRandomly();
          if (typeof animateUIElements === 'function') animateUIElements();
        }, 100);
        
        return;
      }
      
      // Mark that we've loaded
      sessionStorage.setItem('fanterLoaded', 'true');
      
      const loadingScreen = document.getElementById('loadingScreen');
      const progressBar = document.querySelector('.loading-progress-bar');
      const statusEl = document.getElementById('loadingStatus');
      const whiteFlash = document.getElementById('whiteFlash');
      const revealOverlay = document.getElementById('revealOverlay');
      const brokenWallContainer = document.getElementById('brokenWallContainer');
      const mainContent = document.getElementById('mainContent');
      
      // HIDE main content initially
      if (mainContent) {
        mainContent.style.opacity = '0';
        mainContent.style.visibility = 'hidden';
      }
      
      // Matrix Rain
      const canvas = document.getElementById('matrixCanvas');
      const ctx = canvas.getContext('2d');
      let width, height, drops = [];
      const fontSize = 16;
      const chars = "01";
      
      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        const columns = Math.floor(width / fontSize);
        drops = [];
        for (let i = 0; i < columns; i++) {
          drops.push(Math.random() * -height);
        }
      }
      
      function drawMatrix() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = '#00ff88';
        ctx.font = fontSize + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
          const text = chars[Math.floor(Math.random() * chars.length)];
          const x = i * fontSize;
          const y = drops[i] * fontSize;
          ctx.fillText(text, x, y);
          if (y > height && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }
      
      resizeCanvas();
      const matrixInterval = setInterval(drawMatrix, 50);
      window.addEventListener('resize', resizeCanvas);
      
      // Falling code
      function createFallingCode() {
        const el = document.createElement('div');
        el.className = 'falling-matrix';
        let code = '';
        for (let i = 0; i < 15; i++) code += Math.random() > 0.5 ? '1' : '0';
        el.textContent = code;
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (Math.random() * 10 + 10) + 'px';
        el.style.animationDuration = (Math.random() * 2 + 1) + 's';
        const colors = ['#00ff88', '#ff4444', '#ffcc00'];
        el.style.color = colors[Math.floor(Math.random() * colors.length)];
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
      }
      
      // Broken wall
      function createBrokenWall() {
        const wall = document.createElement('div');
        wall.className = 'broken-wall';
        wall.style.left = Math.random() * 100 + '%';
        wall.style.top = Math.random() * 100 + '%';
        wall.style.width = (Math.random() * 200 + 80) + 'px';
        wall.style.height = (Math.random() * 120 + 60) + 'px';
        if (Math.random() > 0.5) wall.classList.add('cracked');
        brokenWallContainer.appendChild(wall);
        setTimeout(() => wall.remove(), 800);
      }
      
      let progress = 0;
      
      const messages = [
        "Initializing fanter.OS...",
        "Loading core modules...",
        "Bypassing firewalls...",
        "Decrypting database...",
        "Loading games library...",
        "Applying themes...",
        "Hacking mainframe...",
        "Almost there...",
        "Starting fanter.OS..."
      ];
      let msgIndex = 0;
      
      // Random effects
      const effectsInterval = setInterval(() => {
        if (progress < 100) {
          if (Math.random() > 0.7) createBrokenWall();
          if (Math.random() > 0.8) createFallingCode();
        }
      }, 500);
      
      // Progress - SLOWER (takes about 5-6 seconds)
      const progressInterval = setInterval(() => {
        if (progress < 100) {
          progress += Math.random() * 2 + 1;  // Slower: 1-3% per update
          if (progress >= 100) {
            progress = 100;
            progressBar.style.width = '100%';
            statusEl.textContent = "Complete! Loading games...";
            clearInterval(progressInterval);
            clearInterval(effectsInterval);
            clearInterval(matrixInterval);
            
            // Wait for games to actually load
            waitForGamesToLoad();
          } else {
            progressBar.style.width = progress + '%';
            const newIndex = Math.floor(progress / 12);
            if (newIndex > msgIndex && newIndex < messages.length) {
              msgIndex = newIndex;
              statusEl.textContent = messages[msgIndex];
            }
          }
        }
      }, 350);  // Update every 350ms
      
      function waitForGamesToLoad() {
        let attempts = 0;
        const maxAttempts = 100;
        
        const checkInterval = setInterval(() => {
          attempts++;
          const gamesContainer = document.getElementById('gamesContainer');
          const hasGames = gamesContainer && gamesContainer.children.length > 0;
          
          console.log(`Waiting for games - Attempt ${attempts}: ${hasGames ? 'Games found!' : 'Waiting...'}`);
          
          if (hasGames) {
            clearInterval(checkInterval);
            setTimeout(() => startTransition(), 800);
          } else if (attempts >= maxAttempts) {
            clearInterval(checkInterval);
            startTransition();
          }
        }, 100);
      }
      
      function startTransition() {
        whiteFlash.style.opacity = '1';
        setTimeout(() => {
          loadingScreen.style.opacity = '0';
          setTimeout(() => {
            loadingScreen.style.display = 'none';
            revealOverlay.style.transform = 'scaleX(1)';
            setTimeout(() => {
              whiteFlash.style.opacity = '0';
              
              // SHOW main content
              if (mainContent) {
                mainContent.style.opacity = '1';
                mainContent.style.visibility = 'visible';
              }
              
              setTimeout(() => {
                animateGamesRandomly();
                animateUIElements();
              }, 100);
              
              setTimeout(() => {
                revealOverlay.style.transform = 'scaleX(0)';
                setTimeout(() => {
                  if (revealOverlay.parentNode) revealOverlay.remove();
                  if (whiteFlash.parentNode) whiteFlash.remove();
                }, 1200);
              }, 500);
            }, 300);
          }, 400);
        }, 300);
      }
      
      function animateGamesRandomly() {
        const games = document.querySelectorAll('.game');
        const gameArray = Array.from(games);
        
        if (gameArray.length === 0) {
          console.log("No games found to animate!");
          return;
        }
        
        console.log(`🎮 Animating ${gameArray.length} games`);
        
        gameArray.forEach(game => {
          game.style.opacity = '0';
          game.style.transform = 'scale(0)';
          game.style.display = 'inline-block';
          game.style.transition = 'all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
        });
        
        // Shuffle array for random appearance
        for (let i = gameArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [gameArray[i], gameArray[j]] = [gameArray[j], gameArray[i]];
        }
        
        gameArray.forEach((game, index) => {
          setTimeout(() => {
            game.style.opacity = '1';
            game.style.transform = 'scale(1)';
            game.style.animation = 'gamePop 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards';
            setTimeout(() => {
              game.style.animation = '';
            }, 300);
          }, index * 30);
        });
      }
      
      function animateUIElements() {
        const elements = [
          { el: document.getElementById('searchInput'), dir: 'left', delay: 50 },
          { el: document.querySelector('.center .settings-btn'), dir: 'right', delay: 100 },
          { el: document.querySelector('.center h1'), dir: 'up', delay: 80 },
          { el: document.querySelector('.center p'), dir: 'up', delay: 120 },
          { el: document.querySelector('.fav-sidebar-btn'), dir: 'left', delay: 150 },
          { el: document.querySelector('.account-btn'), dir: 'right', delay: 60 }
        ];
        
        elements.forEach(item => {
          if (!item.el) return;
          item.el.style.opacity = '0';
          if (item.dir === 'left') item.el.style.transform = 'translateX(-100px)';
          if (item.dir === 'right') item.el.style.transform = 'translateX(100px)';
          if (item.dir === 'up') item.el.style.transform = 'translateY(-30px)';
          item.el.style.transition = 'all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
          
          setTimeout(() => {
            item.el.style.opacity = '1';
            item.el.style.transform = 'translateX(0) translateY(0)';
          }, item.delay);
        });
      }
      
      loadingScreen.addEventListener('click', (e) => e.stopPropagation());
      console.log('Loading screen active - first visit!');
    })();
  </script>
</body>
</html>
