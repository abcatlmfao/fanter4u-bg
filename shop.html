<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fanter | shop</title>
  <link rel="stylesheet" href="config/main.css" />
  <style>
    /* all your existing styles stay the same */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(135deg, #0a0a1a, #0f0f2a, #1a0a2a); background-size: 400% 400%; animation: bgShift 15s ease infinite; font-family: 'Ubuntu', sans-serif; min-height: 100vh; }
    @keyframes bgShift { 0% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } 100% { background-position: 0% 0%; } }
    .shop-container { max-width: 1200px; margin: 100px auto; padding: 20px; }
    .shop-header { display: flex; justify-content: space-between; align-items: center; background: rgba(10, 15, 30, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(45, 90, 227, 0.3); border-radius: 20px; padding: 15px 25px; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
    .shop-title { font-size: 28px; color: #ffcc00; font-family: 'Ubuntu', sans-serif; }
    .coin-display { background: linear-gradient(135deg, rgba(255,204,0,0.2), rgba(255,204,0,0.05)); border: 1px solid rgba(255,204,0,0.3); border-radius: 30px; padding: 10px 20px; display: flex; align-items: center; gap: 10px; }
    .coin-icon { font-size: 24px; }
    .coin-amount { font-size: 24px; font-weight: bold; color: #ffcc00; font-family: 'Orbitron', monospace; }
    .coin-label { font-size: 12px; color: rgba(255,255,255,0.5); }
    .shop-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
    .shop-tab { background: rgba(20, 30, 50, 0.8); border: 1px solid rgba(45, 90, 227, 0.4); border-radius: 30px; padding: 10px 25px; color: white; font-size: 14px; cursor: pointer; transition: all 0.2s ease; font-family: 'Orbitron', monospace; }
    .shop-tab:hover { border-color: #ffcc00; transform: translateY(-2px); }
    .shop-tab.active { background: linear-gradient(135deg, rgba(45,90,227,0.3), rgba(255,204,0,0.1)); border-color: #ffcc00; color: #ffcc00; }
    .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
    .shop-item { background: rgba(20, 30, 50, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(45, 90, 227, 0.3); border-radius: 20px; padding: 20px; transition: all 0.2s ease; position: relative; overflow: hidden; }
    .shop-item:hover { transform: translateY(-5px); border-color: rgba(255, 204, 0, 0.5); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .shop-item.owned { border-color: rgba(0, 255, 0, 0.5); background: rgba(0, 255, 0, 0.05); }
    .shop-item.equipped { border-color: #ffcc00; background: linear-gradient(135deg, rgba(255,204,0,0.1), rgba(255,204,0,0.02)); }
    .item-preview { width: 100%; height: 100px; background: rgba(0,0,0,0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; font-size: 48px; }
    .item-name { font-size: 16px; font-weight: bold; color: white; margin-bottom: 5px; font-family: 'Orbitron', monospace; }
    .item-desc { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 15px; }
    .item-price { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; }
    .price-icon { font-size: 16px; }
    .price-amount { font-size: 18px; font-weight: bold; color: #ffcc00; }
    .item-buttons { display: flex; gap: 10px; }
    .shop-btn { flex: 1; background: rgba(45, 90, 227, 0.3); border: 1px solid rgba(45, 90, 227, 0.4); border-radius: 30px; padding: 10px; color: white; font-size: 12px; cursor: pointer; transition: all 0.2s ease; }
    .shop-btn:hover:not(:disabled) { background: rgba(45, 90, 227, 0.6); border-color: #ffcc00; transform: translateY(-2px); }
    .shop-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .shop-btn.equip { background: rgba(255, 204, 0, 0.2); border-color: #ffcc00; color: #ffcc00; }
    .shop-btn.equipped { background: rgba(0, 255, 0, 0.2); border-color: #00ff88; color: #00ff88; }
    .test-btn { background: rgba(100, 100, 200, 0.3); border: 1px solid rgba(100, 100, 200, 0.4); border-radius: 30px; padding: 10px; color: white; font-size: 12px; cursor: pointer; transition: all 0.2s ease; flex: 0.5; }
    .test-btn:hover { background: rgba(100, 100, 200, 0.6); transform: translateY(-2px); }
    .owned-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,255,0,0.8); color: white; padding: 4px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; }
    .back-btn { background: rgba(20, 30, 50, 0.8); border: 1px solid rgba(45, 90, 227, 0.4); border-radius: 30px; padding: 8px 20px; color: white; cursor: pointer; transition: all 0.2s ease; }
    .back-btn:hover { border-color: #ffcc00; transform: translateY(-2px); }
    .shop-notification { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border: 1px solid #ffcc00; border-radius: 30px; padding: 12px 24px; color: #ffcc00; font-family: 'Orbitron', monospace; font-size: 14px; z-index: 10000; opacity: 0; transition: all 0.3s ease; }
    .shop-notification.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .test-mode-active { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 10px; font-size: 11px; color: #ffcc00; z-index: 10001; pointer-events: none; }
    @media (max-width: 768px) { .shop-container { margin: 80px auto; padding: 15px; } .shop-header { flex-direction: column; text-align: center; } .item-buttons { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="account-btn-container">
    <button class="account-btn" id="accountBtn" onclick="window.location.href='fantaccount.html'">
      <span class="account-icon">👤</span>
      <span class="account-name" id="accountName">Guest</span>
    </button>
  </div>

  <div class="shop-container">
    <div class="shop-header">
      <div class="shop-title">🛒 ITEM SHOP</div>
      <div class="coin-display">
        <span class="coin-icon">🪙</span>
        <span class="coin-amount" id="coinAmount">0</span>
        <span class="coin-label">coins</span>
      </div>
      <button class="back-btn" onclick="window.location.href='index.html'">← back</button>
    </div>

    <div class="shop-tabs">
      <button class="shop-tab active" data-category="backgrounds">🎨 Backgrounds</button>
      <button class="shop-tab" data-category="cursors">🖱️ Cursors</button>
      <button class="shop-tab" data-category="themes">✨ Themes</button>
      <button class="shop-tab" data-category="presets">🎯 Presets</button>
      <button class="shop-tab" data-category="pets">🐾 Pets</button>
    </div>

    <div id="shopGrid" class="shop-grid"></div>
  </div>

  <div id="shopNotification" class="shop-notification"></div>
  <div id="testModeIndicator" class="test-mode-active" style="display:none;">🔍 TEST MODE ACTIVE</div>

  <script>
    // ===== SHOP ITEMS =====
    const SHOP_ITEMS = {
      backgrounds: [
        { id: "bg_default", name: "Default", desc: "Original chill cycle", icon: "🌀", price: 0, type: "background", value: "chill" },
        { id: "bg_parallax", name: "Parallax Stars", desc: "Floating starfield", icon: "🌌", price: 200, type: "background", value: "parallax" },
        { id: "bg_aurora", name: "Aurora Waves", desc: "Flowing northern lights", icon: "🌊", price: 300, type: "background", value: "aurora" },
        { id: "bg_void", name: "The Void", desc: "Pure darkness", icon: "🕳️", price: 150, type: "background", value: "void" },
        { id: "bg_neon", name: "Neon Grid", desc: "Cyberpunk city", icon: "💠", price: 500, type: "background", value: "neon" },
        { id: "bg_rainbow", name: "Rainbow Road", desc: "Colorful spectrum", icon: "🌈", price: 400, type: "background", value: "rainbow" }
      ],
      cursors: [
        { id: "cur_default", name: "Default", desc: "Classic cursor", icon: "🖱️", price: 0, type: "cursor", value: "default" },
        { id: "cur_glow", name: "Glow Orb", desc: "Glowing circle cursor", icon: "🔵", price: 150, type: "cursor", value: "glow" },
        { id: "cur_gold", name: "Gold Star", desc: "Golden star cursor", icon: "⭐", price: 300, type: "cursor", value: "gold" },
        { id: "cur_dragon", name: "Dragon Cursor", desc: "Dragon that follows mouse", icon: "🐉", price: 800, type: "cursor", value: "dragon" }
      ],
      themes: [
        { id: "theme_dark", name: "Dark Mode", desc: "Sleek dark theme", icon: "🌙", price: 200, type: "theme", value: "dark" },
        { id: "theme_light", name: "Light Mode", desc: "Clean bright theme", icon: "☀️", price: 200, type: "theme", value: "light" },
        { id: "theme_neon", name: "Neon City", desc: "Cyberpunk neon", icon: "💚", price: 500, type: "theme", value: "neon" }
      ],
      presets: [
        { id: "preset_cool_blue", name: "Cool Blue", desc: "All blue everything", icon: "💙", price: 100, type: "preset", value: "cool_blue" },
        { id: "preset_warm_sunset", name: "Warm Sunset", desc: "Orange and gold", icon: "🧡", price: 100, type: "preset", value: "warm_sunset" },
        { id: "preset_purple_haze", name: "Purple Haze", desc: "Mystic purple", icon: "💜", price: 100, type: "preset", value: "purple_haze" }
      ],
      pets: [
        { id: "pet_chinchilla", name: "Sir Chinchilla", desc: "1.0x coins", icon: "🐹", price: 500, type: "pet", value: "chinchilla", multiplier: 1.0 },
        { id: "pet_dragon", name: "Baby Dragon", desc: "1.5x coins", icon: "🐉", price: 1000, type: "pet", value: "dragon", multiplier: 1.5 },
        { id: "pet_cat", name: "Space Cat", desc: "1.2x coins", icon: "🐱", price: 750, type: "pet", value: "cat", multiplier: 1.2 }
      ]
    };

    // ===== STATE =====
    let currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
    let userInventory = JSON.parse(localStorage.getItem('fanter_inventory') || '{}');
    let equippedItems = JSON.parse(localStorage.getItem('fanter_equipped') || '{}');
    
    // Make sure default items are always owned
    userInventory['bg_default'] = true;
    userInventory['cur_default'] = true;
    localStorage.setItem('fanter_inventory', JSON.stringify(userInventory));

    // ===== HELPER FUNCTIONS =====
    function showNotification(message) {
      const notif = document.getElementById('shopNotification');
      notif.textContent = message;
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), 2000);
    }

    function updateCoinDisplay() {
      const coinEl = document.getElementById('coinAmount');
      if (coinEl && currentUser) {
        coinEl.textContent = Math.floor((currentUser.coins || 0) * 100) / 100;
      }
    }

    // ===== PURCHASE ITEM =====
    function purchaseItem(item) {
      if (!currentUser) {
        showNotification("❌ Please log in to purchase items!");
        return;
      }

      if (userInventory[item.id]) {
        showNotification(`✅ You already own ${item.name}!`);
        return;
      }

      if ((currentUser.coins || 0) < item.price) {
        showNotification(`❌ Not enough coins! Need ${item.price} 🪙`);
        return;
      }

      // Deduct coins
      currentUser.coins = (currentUser.coins || 0) - item.price;
      
      // Add to inventory
      userInventory[item.id] = true;
      
      // Save everything
      localStorage.setItem('fanter_currentUser', JSON.stringify(currentUser));
      localStorage.setItem('fanter_inventory', JSON.stringify(userInventory));
      
      // Update users list
      let users = JSON.parse(localStorage.getItem('fanter_users') || '[]');
      const userIndex = users.findIndex(u => u.id === currentUser.id);
      if (userIndex !== -1) {
        users[userIndex].coins = currentUser.coins;
        users[userIndex].inventory = userInventory;
        localStorage.setItem('fanter_users', JSON.stringify(users));
      }
      
      updateCoinDisplay();
      showNotification(`🎉 Purchased ${item.name}!`);
      renderShopItems(document.querySelector('.shop-tab.active').dataset.category);
      
      if (typeof updateHeaderCoins === 'function') updateHeaderCoins();
    }

    // ===== EQUIP ITEM =====
    function equipItem(item) {
      equippedItems[item.type] = item.value;
      localStorage.setItem('fanter_equipped', JSON.stringify(equippedItems));
      
      if (item.type === 'pet') {
        localStorage.setItem('equippedPet', item.value);
        showNotification(`✨ Equipped ${item.name}! ${item.multiplier}x coins`);
      } else {
        // Apply the item immediately
        applyItemEffect(item);
        showNotification(`✨ Equipped ${item.name}!`);
      }
      
      renderShopItems(document.querySelector('.shop-tab.active').dataset.category);
    }

    // ===== APPLY ITEM EFFECT =====
    function applyItemEffect(item) {
      const themeSettings = JSON.parse(localStorage.getItem('themeSettings') || '{}');
      
      switch(item.type) {
        case 'background':
          themeSettings.bg = item.value;
          break;
        case 'theme':
          themeSettings.theme = item.value;
          break;
        case 'preset':
          if (item.value === 'cool_blue') {
            themeSettings.fontColor = '#4488ff';
            themeSettings.solidColor = '#1a2a4a';
          } else if (item.value === 'warm_sunset') {
            themeSettings.fontColor = '#ff8844';
            themeSettings.solidColor = '#4a2a1a';
          } else if (item.value === 'purple_haze') {
            themeSettings.fontColor = '#aa44ff';
            themeSettings.solidColor = '#2a1a4a';
          }
          break;
      }
      
      localStorage.setItem('themeSettings', JSON.stringify(themeSettings));
      if (typeof window.loadAndApplyTheme === 'function') {
        window.loadAndApplyTheme();
      }
    }

    // ===== TEST ITEM =====
    let originalSettings = null;
    let testTimeout = null;
    
    function testItem(item) {
      const indicator = document.getElementById('testModeIndicator');
      indicator.style.display = 'block';
      
      if (testTimeout) clearTimeout(testTimeout);
      if (!originalSettings) {
        originalSettings = JSON.parse(localStorage.getItem('themeSettings') || '{}');
      }
      
      // Temporarily apply the item
      applyItemEffect(item);
      showNotification(`🔍 Testing: ${item.name} for 10 seconds`);
      
      testTimeout = setTimeout(() => {
        // Restore original settings
        localStorage.setItem('themeSettings', JSON.stringify(originalSettings));
        if (typeof window.loadAndApplyTheme === 'function') {
          window.loadAndApplyTheme();
        }
        indicator.style.display = 'none';
        originalSettings = null;
        showNotification(`✨ Test ended. Purchase to keep!`);
      }, 10000);
    }

    // ===== RENDER SHOP =====
    function renderShopItems(category) {
      const grid = document.getElementById('shopGrid');
      const items = SHOP_ITEMS[category];
      if (!items) return;
      
      grid.innerHTML = '';
      
      items.forEach(item => {
        const owned = userInventory[item.id] || false;
        let isEquipped = false;
        
        if (item.type === 'pet') {
          isEquipped = localStorage.getItem('equippedPet') === item.value;
        } else {
          isEquipped = equippedItems[item.type] === item.value;
        }
        
        const itemDiv = document.createElement('div');
        itemDiv.className = `shop-item ${owned ? 'owned' : ''} ${isEquipped ? 'equipped' : ''}`;
        
        itemDiv.innerHTML = `
          ${owned ? '<div class="owned-badge">✓ OWNED</div>' : ''}
          <div class="item-preview">${item.icon}</div>
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
          <div class="item-price">
            <span class="price-icon">🪙</span>
            <span class="price-amount">${item.price}</span>
          </div>
          <div class="item-buttons">
            <button class="test-btn">🔍 TEST</button>
        `;
        
        const btn = document.createElement('button');
        btn.className = 'shop-btn';
        
        if (owned && isEquipped) {
          btn.textContent = '✓ EQUIPPED';
          btn.classList.add('equipped');
          btn.disabled = true;
        } else if (owned) {
          btn.textContent = '⚡ EQUIP';
          btn.classList.add('equip');
          btn.onclick = () => equipItem(item);
        } else {
          btn.textContent = `🪙 ${item.price}`;
          btn.onclick = () => purchaseItem(item);
        }
        
        itemDiv.querySelector('.item-buttons').appendChild(btn);
        itemDiv.querySelector('.test-btn').onclick = (e) => {
          e.stopPropagation();
          testItem(item);
        };
        
        grid.appendChild(itemDiv);
      });
    }

    // ===== INIT =====
    document.querySelectorAll('.shop-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderShopItems(tab.dataset.category);
      };
    });

    function updateAccountButton() {
      const accountNameSpan = document.getElementById('accountName');
      if (accountNameSpan) {
        accountNameSpan.textContent = currentUser ? (currentUser.displayName || currentUser.username) : 'Guest';
      }
    }

    updateCoinDisplay();
    updateAccountButton();
    renderShopItems('backgrounds');
    
    console.log('✅ Shop loaded - purchases now properly unlock items!');
  </script>
</body>
</html>
