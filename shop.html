<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fanter | shop</title>
  <link rel="stylesheet" href="config/main.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a1a, #0f0f2a, #1a0a2a);
      background-size: 400% 400%;
      animation: bgShift 15s ease infinite;
      font-family: 'Ubuntu', sans-serif;
      min-height: 100vh;
    }

    @keyframes bgShift {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    .shop-container {
      max-width: 1200px;
      margin: 100px auto;
      padding: 20px;
    }

    .shop-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 15, 30, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(45, 90, 227, 0.3);
      border-radius: 20px;
      padding: 15px 25px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .shop-title {
      font-size: 28px;
      color: #ffcc00;
      font-family: 'Ubuntu', sans-serif;
    }

    .coin-display {
      background: linear-gradient(135deg, rgba(255,204,0,0.2), rgba(255,204,0,0.05));
      border: 1px solid rgba(255,204,0,0.3);
      border-radius: 30px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .coin-icon {
      font-size: 24px;
    }

    .coin-amount {
      font-size: 24px;
      font-weight: bold;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
    }

    .coin-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }

    .shop-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .shop-tab {
      background: rgba(20, 30, 50, 0.8);
      border: 1px solid rgba(45, 90, 227, 0.4);
      border-radius: 30px;
      padding: 10px 25px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Orbitron', monospace;
    }

    .shop-tab:hover {
      border-color: #ffcc00;
      transform: translateY(-2px);
    }

    .shop-tab.active {
      background: linear-gradient(135deg, rgba(45,90,227,0.3), rgba(255,204,0,0.1));
      border-color: #ffcc00;
      color: #ffcc00;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .shop-item {
      background: rgba(20, 30, 50, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(45, 90, 227, 0.3);
      border-radius: 20px;
      padding: 20px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .shop-item:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 204, 0, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .shop-item.owned {
      border-color: rgba(0, 255, 0, 0.5);
      background: rgba(0, 255, 0, 0.05);
    }

    .shop-item.equipped {
      border-color: #ffcc00;
      background: linear-gradient(135deg, rgba(255,204,0,0.1), rgba(255,204,0,0.02));
    }

    .item-preview {
      width: 100%;
      height: 100px;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      font-size: 48px;
    }

    .item-name {
      font-size: 16px;
      font-weight: bold;
      color: white;
      margin-bottom: 5px;
      font-family: 'Orbitron', monospace;
    }

    .item-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 15px;
    }

    .item-price {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
    }

    .price-icon {
      font-size: 16px;
    }

    .price-amount {
      font-size: 18px;
      font-weight: bold;
      color: #ffcc00;
    }

    .item-buttons {
      display: flex;
      gap: 10px;
    }

    .shop-btn {
      flex: 1;
      background: rgba(45, 90, 227, 0.3);
      border: 1px solid rgba(45, 90, 227, 0.4);
      border-radius: 30px;
      padding: 10px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .shop-btn:hover:not(:disabled) {
      background: rgba(45, 90, 227, 0.6);
      border-color: #ffcc00;
      transform: translateY(-2px);
    }

    .shop-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .shop-btn.equip {
      background: rgba(255, 204, 0, 0.2);
      border-color: #ffcc00;
      color: #ffcc00;
    }

    .shop-btn.equipped {
      background: rgba(0, 255, 0, 0.2);
      border-color: #00ff88;
      color: #00ff88;
    }

    .test-btn {
      background: rgba(100, 100, 200, 0.3);
      border: 1px solid rgba(100, 100, 200, 0.4);
      border-radius: 30px;
      padding: 10px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      flex: 0.5;
    }

    .test-btn:hover {
      background: rgba(100, 100, 200, 0.6);
      transform: translateY(-2px);
    }

    .owned-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,255,0,0.8);
      color: white;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: bold;
    }

    .back-btn {
      background: rgba(20, 30, 50, 0.8);
      border: 1px solid rgba(45, 90, 227, 0.4);
      border-radius: 30px;
      padding: 8px 20px;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      border-color: #ffcc00;
      transform: translateY(-2px);
    }

    .shop-notification {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      border: 1px solid #ffcc00;
      border-radius: 30px;
      padding: 12px 24px;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      z-index: 10000;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .shop-notification.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .test-mode-active {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 11px;
      color: #ffcc00;
      z-index: 10001;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .shop-container {
        margin: 80px auto;
        padding: 15px;
      }
      .shop-header {
        flex-direction: column;
        text-align: center;
      }
      .item-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>

    let originalBackground = '';
    let testTimeout = null;
    
    function showNotification(message) {
      const notif = document.getElementById('shopNotification');
      notif.textContent = message;
      notif.classList.add('show');
      setTimeout(() => {
        notif.classList.remove('show');
      }, 2000);
    }
    
    function testItem(item) {
      const indicator = document.getElementById('testModeIndicator');
      indicator.style.display = 'block';
      if (testTimeout) clearTimeout(testTimeout);
      
      if (!originalBackground) {
        originalBackground = document.body.className;
      }
      
      if (item.testApply) {
        item.testApply();
      } else if (item.apply) {
        item.apply();
      }
      
      showNotification(`🔍 Testing: ${item.name} for 10 seconds`);
      
      testTimeout = setTimeout(() => {
        document.body.className = originalBackground;
        if (window.removeTestEffects) window.removeTestEffects();
        indicator.style.display = 'none';
        showNotification(`✨ Test ended. Purchase to keep this look!`);
      }, 10000);

          apply: function() { localStorage.setItem('equippedPet', 'dog'); showNotification("🐶 Cyber Dog equipped! 1.2x coin multiplier"); },
          testApply: function() { showNotification("🐶 Cyber Dog wags its tail!"); } },
        { id: "pet_owl", name: "Wise Owl", desc: "Ancient knowledge (1.3x coins)", icon: "🦉", price: 800, type: "pet", value: "owl", multiplier: 1.3,
          apply: function() { localStorage.setItem('equippedPet', 'owl'); showNotification("🦉 Wise Owl equipped! 1.3x coin multiplier"); },
          testApply: function() { showNotification("🦉 The owl hoots wisely!"); } },
        { id: "pet_fox", name: "Fire Fox", desc: "Flame-tailed fox (1.4x coins)", icon: "🦊", price: 850, type: "pet", value: "fox", multiplier: 1.4,
          apply: function() { localStorage.setItem('equippedPet', 'fox'); showNotification("🦊 Fire Fox equipped! 1.4x coin multiplier"); },
          testApply: function() { showNotification("🦊 The fox dashes by!"); } }
      ]
    };

    let currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
    let userInventory = JSON.parse(localStorage.getItem('fanter_inventory') || '{}');
    let equippedItems = JSON.parse(localStorage.getItem('fanter_equipped') || '{}');
    let equippedPet = localStorage.getItem('equippedPet');

    // ===== CURSOR FUNCTIONS =====
    let cursorElement = null;
    let dragonElement = null;
    
    function removeCustomCursor() {
      if (cursorElement) cursorElement.remove();
      if (dragonElement) dragonElement.remove();
      cursorElement = null;
      dragonElement = null;
    }
    
    function initGlowCursor() {
      removeCustomCursor();
      document.body.style.cursor = 'none';
      
      cursorElement = document.createElement('div');
      cursorElement.style.cssText = `
        width: 20px;
        height: 20px;
        background: radial-gradient(circle, #2d5ae3, #00ffcc);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 99999;
        box-shadow: 0 0 15px #2d5ae3;
        transition: all 0.05s ease;
      `;
      document.body.appendChild(cursorElement);
      
      let mouseX = 0, mouseY = 0;
      let cursorX = 0, cursorY = 0;
      
      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });
      
      function animate() {
        cursorX += (mouseX - cursorX) * 0.2;
        cursorY += (mouseY - cursorY) * 0.2;
        cursorElement.style.left = (cursorX - 10) + 'px';
        cursorElement.style.top = (cursorY - 10) + 'px';
        requestAnimationFrame(animate);
      }
      animate();
    }
    
    function initDragonCursor() {
      removeCustomCursor();
      document.body.style.cursor = 'none';
      
      dragonElement = document.createElement('div');
      dragonElement.innerHTML = '🐉';
      dragonElement.style.cssText = `
        font-size: 28px;
        position: fixed;
        pointer-events: none;
        z-index: 99999;
        filter: drop-shadow(0 0 5px #ff4444);
        transition: all 0.05s linear;
      `;
      document.body.appendChild(dragonElement);
      
      let mouseX = 0, mouseY = 0;
      let dragonXPos = 0, dragonYPos = 0;
      
      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });
      
      function animate() {
        dragonXPos += (mouseX - dragonXPos) * 0.15;
        dragonYPos += (mouseY - dragonYPos) * 0.15;
        dragonElement.style.left = (dragonXPos - 14) + 'px';
        dragonElement.style.top = (dragonYPos - 14) + 'px';
        requestAnimationFrame(animate);
      }
      animate();
    }
    
    // ===== THEME FUNCTIONS =====
    function removeAllThemes() {
      document.body.classList.remove('theme-dark', 'theme-light', 'theme-neon-city', 'theme-color-blast', 'theme-forest-night', 'theme-deep-ocean');
      removeNeonBuildings();
      removeForestEffects();
      removeOceanEffects();
    }
    
    function removeAllPresets() {
      document.body.classList.remove('preset-cool-blue', 'preset-warm-sunset', 'preset-purple-haze', 'preset-rgb');
    }
    
    function initNeonBuildings() {
      removeNeonBuildings();
      const buildings = document.querySelectorAll('.game, .settings-card, .sidebar-card');
      buildings.forEach((building) => {
        if (Math.random() > 0.7) {
          building.style.boxShadow = '0 0 15px #00ffcc';
          building.style.borderColor = '#00ffcc';
        }
      });
    }
    
    function removeNeonBuildings() {
      const buildings = document.querySelectorAll('.game, .settings-card, .sidebar-card');
      buildings.forEach(building => {
        building.style.boxShadow = '';
        building.style.borderColor = '';
      });
    }
    
    let windInterval = null;
    function initForestEffects() {
      removeForestEffects();
      let angle = 0;
      windInterval = setInterval(() => {
        angle = (angle + 5) % 360;
        const windX = Math.sin(angle * Math.PI / 180) * 5;
        document.body.style.transform = `translateX(${windX}px)`;
      }, 200);
    }
    
    function removeForestEffects() {
      if (windInterval) clearInterval(windInterval);
      document.body.style.transform = '';
    }
    
    let oceanIntervalBubbles = null;
    
    function initOceanTheme() {
      removeOceanEffects();
      
      const fishTypes = ['🐟', '🐠', '🐡', '🐙', '🦑', '🐬', '🐳'];
      for (let i = 0; i < 12; i++) {
        setTimeout(() => {
          const fish = document.createElement('div');
          fish.textContent = fishTypes[Math.floor(Math.random() * fishTypes.length)];
          fish.style.cssText = `
            position: fixed;
            font-size: ${24 + Math.random() * 20}px;
            pointer-events: none;
            z-index: 0;
            left: -50px;
            top: ${Math.random() * 100}%;
            opacity: 0.6;
            animation: swimFish ${15 + Math.random() * 20}s linear forwards;
          `;
          document.body.appendChild(fish);
          setTimeout(() => fish.remove(), 25000);
        }, i * 800);
      }
      
      oceanIntervalBubbles = setInterval(() => {
        const bubble = document.createElement('div');
        bubble.style.cssText = `
          position: fixed;
          width: ${4 + Math.random() * 8}px;
          height: ${4 + Math.random() * 8}px;
          background: rgba(100, 200, 255, 0.4);
          border-radius: 50%;
          pointer-events: none;
          z-index: 0;
          left: ${Math.random() * 100}%;
          bottom: -20px;
          animation: bubbleRise ${4 + Math.random() * 6}s linear forwards;
        `;
        document.body.appendChild(bubble);
        setTimeout(() => bubble.remove(), 8000);
      }, 400);
    }
    
    function removeOceanEffects() {
      document.querySelectorAll('.ocean-fish, .ocean-bubble').forEach(el => el.remove());
      if (oceanIntervalBubbles) clearInterval(oceanIntervalBubbles);
    }

    function updateCoinDisplay() {
      const coinEl = document.getElementById('coinAmount');
      if (coinEl && currentUser) {
        coinEl.textContent = Math.floor((currentUser.coins || 0) * 100) / 100;
      }
    }

    function purchaseItem(item) {
      if (!currentUser) {
        showNotification("❌ Please log in to purchase items!");
        window.location.href = 'fantaccount.html';
        return;
      }

      if (userInventory[item.id]) {
        showNotification(`✅ You already own ${item.name}!`);
        return;
      }

      if ((currentUser.coins || 0) < item.price) {
        showNotification(`❌ Not enough coins! Need ${item.price} 🪙`);
        return;
      }

      currentUser.coins = (currentUser.coins || 0) - item.price;
      userInventory[item.id] = true;
      
      localStorage.setItem('fanter_currentUser', JSON.stringify(currentUser));
      localStorage.setItem('fanter_inventory', JSON.stringify(userInventory));
      
      let users = JSON.parse(localStorage.getItem('fanter_users') || '[]');
      const userIndex = users.findIndex(u => u.id === currentUser.id);
      if (userIndex !== -1) {
        users[userIndex].coins = currentUser.coins;
        localStorage.setItem('fanter_users', JSON.stringify(users));
      }
      
      updateCoinDisplay();
      showNotification(`🎉 Purchased ${item.name}!`);
      renderShopItems(document.querySelector('.shop-tab.active').dataset.category);
      
      if (typeof updateHeaderCoins === 'function') updateHeaderCoins();
    }

    function equipItem(item) {
      equippedItems[item.type] = item.value;
      localStorage.setItem('fanter_equipped', JSON.stringify(equippedItems));
      
      if (item.type === 'pet') {
        localStorage.setItem('equippedPet', item.value);
        showNotification(`✨ Equipped ${item.name}! ${item.multiplier}x coin multiplier active`);
      } else if (item.apply) {
        item.apply();
        showNotification(`✨ Equipped ${item.name}!`);
      }
      
      renderShopItems(document.querySelector('.shop-tab.active').dataset.category);
    }

    function renderShopItems(category) {
      const grid = document.getElementById('shopGrid');
      const items = SHOP_ITEMS[category];
      if (!items) return;
      
      grid.innerHTML = '';
      
      items.forEach(item => {
        const owned = userInventory[item.id];
        let isEquipped = false;
        
        if (item.type === 'pet') {
          isEquipped = localStorage.getItem('equippedPet') === item.value;
        } else {
          isEquipped = equippedItems[item.type] === item.value;
        }
        
        const itemDiv = document.createElement('div');
        itemDiv.className = `shop-item ${owned ? 'owned' : ''} ${isEquipped ? 'equipped' : ''}`;
        
        itemDiv.innerHTML = `
          ${owned ? '<div class="owned-badge">✓ OWNED</div>' : ''}
          <div class="item-preview">${item.icon}</div>
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
          <div class="item-price">
            <span class="price-icon">🪙</span>
            <span class="price-amount">${item.price}</span>
          </div>
          <div class="item-buttons">
            <button class="test-btn" data-test="true">🔍 TEST</button>
        `;
        
        const btn = document.createElement('button');
        btn.className = 'shop-btn';
        
        if (owned && isEquipped) {
          btn.textContent = '✓ EQUIPPED';
          btn.classList.add('equipped');
          btn.disabled = true;
        } else if (owned) {
          btn.textContent = '⚡ EQUIP';
          btn.classList.add('equip');
          btn.onclick = () => equipItem(item);
        } else {
          btn.textContent = `🪙 PURCHASE (${item.price})`;
          btn.onclick = () => purchaseItem(item);
        }
        
        itemDiv.querySelector('.item-buttons').appendChild(btn);
        itemDiv.querySelector('.test-btn').onclick = (e) => {
          e.stopPropagation();
          testItem(item);
        };
        
        grid.appendChild(itemDiv);
      });
    }

    document.querySelectorAll('.shop-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderShopItems(tab.dataset.category);
      };
    });

    function loadEquippedItems() {
      if (equippedItems.background) {
        const bgItem = SHOP_ITEMS.backgrounds.find(i => i.value === equippedItems.background);
        if (bgItem && bgItem.apply) bgItem.apply();
      }
      if (equippedItems.theme) {
        const themeItem = SHOP_ITEMS.themes.find(i => i.value === equippedItems.theme);
        if (themeItem && themeItem.apply) themeItem.apply();
      }
      if (equippedItems.cursor) {
        const cursorItem = SHOP_ITEMS.cursors.find(i => i.value === equippedItems.cursor);
        if (cursorItem && cursorItem.apply) cursorItem.apply();
      }
    }

    function updateAccountButton() {
      const accountNameSpan = document.getElementById('accountName');
      if (accountNameSpan) {
        accountNameSpan.textContent = currentUser ? (currentUser.displayName || currentUser.username) : 'Guest';
      }
    }

    updateCoinDisplay();
    updateAccountButton();
    loadEquippedItems();
    renderShopItems('backgrounds');
    
    // Add CSS animations
    const style = document.createElement('style');
    style.textContent = `
      @keyframes swimFish {
        0% { transform: translateX(-100px); }
        100% { transform: translateX(calc(100vw + 100px)); }
      }
      @keyframes bubbleRise {
        0% { transform: translateY(0) scale(1); opacity: 0.5; }
        100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
      }
      @keyframes colorBlast {
        0% { filter: hue-rotate(0deg) saturate(1.3); }
        100% { filter: hue-rotate(360deg) saturate(1.3); }
      }
      body.theme-color-blast {
        animation: colorBlast 8s linear infinite !important;
      }
      @keyframes rgbCycle {
        0% { filter: hue-rotate(0deg); }
        100% { filter: hue-rotate(360deg); }
      }
      body.preset-rgb {
        animation: rgbCycle 6s linear infinite;
      }
      body.theme-forest-night {
        background: linear-gradient(135deg, #0a1a0a, #0a2a0a, #0a3a0a) !important;
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
